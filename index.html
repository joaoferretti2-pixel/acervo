<style>
*{box-sizing:border-box}
html,body,#root{height:100%}
body{margin:0;background:#F2EEE3}
.theme-dark{
  --ink:#13172A; --raised:#1B2140; --line:#2A3157; --line2:#363f6b;
  --parch:#ECE5D6; --muted:#8E93AD; --lamp:#E7B264; --lamp-hi:#ffe9c0; --lampglow:rgba(231,178,100,.55);
  --film:#E7B264; --book:#9FB0C9; --rose:#C77B6F;
  --accent-soft:rgba(231,178,100,.08); --accent-line:rgba(231,178,100,.38); --focus:rgba(231,178,100,.14);
  --book-soft:rgba(159,176,201,.08); --book-line:rgba(159,176,201,.35); --rose-line:rgba(199,123,111,.5);
  --glow:rgba(231,178,100,.07); --shadow-card:0 10px 28px -16px rgba(0,0,0,.7);
  --shadow-modal:0 30px 80px -20px rgba(0,0,0,.8); --backdrop-bg:rgba(8,10,18,.66); --tab-dark:#1a1406;
}
.theme-light{
  --ink:#F2EEE3; --raised:#FBF8F1; --line:#E6DECC; --line2:#D8CDB6;
  --parch:#2D3142; --muted:#867E6B; --lamp:#C5882F; --lamp-hi:#EFC36F; --lampglow:rgba(197,138,54,.26);
  --film:#D49A45; --book:#6E8198; --rose:#B25A4D;
  --accent-soft:rgba(197,138,54,.12); --accent-line:rgba(197,138,54,.42); --focus:rgba(197,138,54,.22);
  --book-soft:rgba(110,129,152,.12); --book-line:rgba(110,129,152,.40); --rose-line:rgba(178,90,77,.45);
  --glow:rgba(212,154,69,.10); --shadow-card:0 12px 30px -18px rgba(60,50,30,.20);
  --shadow-modal:0 28px 70px -24px rgba(60,50,30,.26); --backdrop-bg:rgba(45,40,30,.34); --tab-dark:#241a05;
}
.av-shell{min-height:100vh;background:radial-gradient(1100px 480px at 50% -220px, var(--glow), transparent 62%), var(--ink);color:var(--parch);font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
.av-root{min-height:100vh; display:grid; grid-template-columns:240px 1fr;
  background:radial-gradient(1100px 480px at 50% -220px, var(--glow), transparent 62%), var(--ink);
  color:var(--parch); font-family:'Hanken Grotesk',system-ui,sans-serif; font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased; transition:background .3s,color .3s}
.av-side{border-right:1px solid var(--line); padding:30px 22px; display:flex; flex-direction:column; gap:30px; position:sticky; top:0; height:100vh}
.av-brand{display:flex;flex-direction:column;gap:4px}
.av-brandrow{display:flex;align-items:center;gap:11px}
.av-brandlink{cursor:pointer}
.av-logomark{width:38px;height:38px;flex:none}
.av-logomark.lg{width:52px;height:52px}
.av-recseed{font-size:11.5px;color:var(--muted);letter-spacing:.02em}
.av-sugwhy{font-size:11.5px;color:var(--lamp)}
.av-typetab.tv{background:#5E7C8A;color:#fff}
.av-installsec{margin-bottom:16px}
.av-installtitle{margin:0 0 6px;font-weight:700;font-size:14.5px}
.av-installsteps{margin:0;padding-left:20px;font-size:14px;line-height:1.7;color:var(--parch)}
.av-version{display:block;font-size:11px;color:var(--muted);opacity:.75;margin-top:4px;text-align:center}
.av-consumed{margin:2px 0 0;font-size:12px;color:var(--muted);font-style:italic}
.av-actwhen{font-size:12px;color:var(--muted)}
.av-selrow{display:flex;gap:10px}
.av-selhalf{flex:1;min-width:0}
.av-fbok{margin:6px 0;font-size:15px;line-height:1.55;color:var(--parch)}
.av-sharefoot{display:flex;align-items:center;gap:10px;margin-top:10px}
.av-likebtn{background:none;border:1px solid var(--line);border-radius:999px;padding:4px 12px;font:inherit;font-size:13px;color:var(--muted);cursor:pointer}
.av-likebtn.on{color:#C0392B;border-color:#C0392B}
.av-newdot{position:absolute;top:6px;right:calc(50% - 16px);width:8px;height:8px;border-radius:50%;background:var(--lamp)}
.av-newdot.side{top:50%;right:14px;transform:translateY(-50%)}
.av-goal{margin:14px 0}

var DICT_EN_LC=null;
function dictLookup(s){
  if(DICT_EN[s]!=null) return DICT_EN[s];
  if(!DICT_EN_LC){ DICT_EN_LC={}; for(var k in DICT_EN){ var lk=k.toLowerCase(); DICT_EN_LC[lk]=DICT_EN[k]; var tk=lk.trim(); if(DICT_EN_LC[tk]==null) DICT_EN_LC[tk]=DICT_EN[k].trim(); } }
  var t=DICT_EN_LC[s.toLowerCase()];
  if(t==null) return null;
  if(s===s.toUpperCase() && s!==s.toLowerCase()) return t.toUpperCase();
  if(s===s.toLowerCase()) return t.toLowerCase();
  return t;
}
function applyLang(root){
  if(!root || state.lang!=="en") return;
  var q=root.querySelectorAll("[placeholder],[aria-label],[alt],[title]"), ATTRS=["placeholder","aria-label","alt","title"];
  for(var i=0;i<q.length;i++){ for(var a=0;a<ATTRS.length;a++){ var v=q[i].getAttribute(ATTRS[a]); if(v==null) continue; var tv=v.trim(); if(!tv) continue; var rv=dictLookup(tv); if(rv!=null) q[i].setAttribute(ATTRS[a], v.replace(tv, rv)); } }
  try{
    var w=document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null), nodes=[], n;
    while((n=w.nextNode())) nodes.push(n);
    for(var j=0;j<nodes.length;j++){ var raw=nodes[j].nodeValue; if(!raw) continue; var key=raw.trim(); if(!key) continue; var rep=dictLookup(key); if(rep!=null){ var lead=(raw.match(/^\s*/)||[""])[0], trail=(raw.match(/\s*$/)||[""])[0]; nodes[j].nodeValue=lead+rep+trail; } }
  }catch(e){}
}

/* ===== Gêneros em PT =====
   TMDB devolve gênero já em pt-BR quando o app está em PT (não precisa traduzir),
   mas Google Books/Open Library NUNCA devolvem em português — essas APIs não têm
   opção de idioma pra esse campo. Itens salvos com o app em EN também gravaram
   o gênero em inglês. Este mapa canoniza tudo pra PT: cobre tanto os nomes em
   inglês (chave) quanto os próprios nomes em PT (também viram chave, gerado
   abaixo automaticamente) — assim reconhece o valor não importa de onde veio.
   Política: se o gênero não é reconhecido (cauda longa de categorias/subjects
   do Google Books e do Open Library — ex.: "Bildungsromans", tags de assunto
   bem específicas), NÃO mostra em vez de vazar em inglês — ver trGenre().
   Aplicado tanto na gravação (resolveMeta) quanto na exibição e nos cálculos
   (cards, ordenação, compatibilidade, Panorama, "me ajuda a escolher"). No modo
   EN, o DICT_EN traduz o nome PT de volta pro inglês na varredura de DOM. */

  /* Gera automaticamente uma chave "identidade" pra cada valor canônico em PT
     (ex.: "ficção científica" -> "Ficção científica"). Isso deixa trGenre()
     reconhecer tanto o termo em inglês (chave original) quanto o termo já
     correto em português (como o TMDB devolve quando o app já está em PT),
     sem precisar duplicar o dicionário manualmente. */
  var extra={};
  for(var k in GENRE_PT){ var v=GENRE_PT[k]; var vk=v.toLowerCase(); if(!(vk in GENRE_PT)) extra[vk]=v; }
  for(var k2 in extra) GENRE_PT[k2]=extra[k2];
})();
/* Só devolve um gênero se ele for reconhecido (em qualquer forma — inglês ou
   português). Gênero desconhecido devolve null — quem chama deve descartar,
   não mostrar sem traduzir. É a política de "nunca vaza inglês": melhor não
   mostrar um gênero do que mostrar num idioma diferente do escolhido. */
function trGenre(g){
  g=String(g||"").trim(); if(!g) return null;
  var t=GENRE_PT[g.toLowerCase()];
  if(t) return t;
  /* Google Books usa caminhos com barra ("Biography & Autobiography / Personal Memoirs") */
  if(g.indexOf("/")>=0){
    var parts=g.split("/");
    for(var i=0;i<parts.length;i++){ var p=GENRE_PT[parts[i].trim().toLowerCase()]; if(p) return p; }
  }
  return null;
}

function el(tag, props){
  var node=document.createElement(tag);
  if(props){
    for(var k in props){
      var v=props[k];
      if(v==null||v===false) continue;
      if(k==="class") node.className=v;
      else if(k==="style" && typeof v==="object"){ for(var sk in v) node.style[sk]=v[sk]; }
      else if(k.slice(0,2)==="on" && typeof v==="function") node.addEventListener(k.slice(2).toLowerCase(), v);
      else if(k in node){ try{ node[k]=v; }catch(e){ node.setAttribute(k,v); } }
      else node.setAttribute(k,v);
    }
  }
  for(var a=2;a<arguments.length;a++){
    var kid=arguments[a];
    if(kid==null||kid===false) continue;
    if(Array.isArray(kid)){ for(var j=0;j<kid.length;j++){ var c=kid[j]; if(c==null||c===false) continue; node.appendChild(typeof c==="object"?c:document.createTextNode(String(c))); } }
    else node.appendChild(typeof kid==="object"?kid:document.createTextNode(String(kid)));
  }
  return node;
}

/* ===== Camada de dados (Supabase) ===== */
function cw(promise){ Promise.resolve(promise).then(function(res){ if(res && res.error) console.error("Supabase:", res.error.message); }).catch(function(e){ console.error("Supabase:", e); }); }
var META_COLS=["tmdb_id","google_books_id","open_library_key","isbn13","original_title","release_year","genres","creators","runtime","page_count","is_favorite","paused","is_rewatch","is_private"];
function stripMeta(p){ var c=Object.assign({},p); META_COLS.forEach(function(k){ delete c[k]; }); return c; }
/* Se o banco ainda não tiver as colunas da migração P1, re-tenta a gravação sem elas. */
function cwItemWrite(payload, id){
  var run=function(p){ return id ? supabase.from("items").update(p).eq("id",id) : supabase.from("items").insert(p); };
  Promise.resolve(run(payload)).then(function(res){
    if(res && res.error){
      var m=String(res.error.message||"");
      if(/column|schema/i.test(m)){ cw(run(stripMeta(payload))); console.warn("Acervo: gravado sem metadados (rode acervo-p1-metadados.sql no Supabase)."); }

async function cloudFetchAll(){
  var uid = state.user.id;
  var res = await Promise.all([
    supabase.from("items").select("*").eq("user_id", uid),
    supabase.from("collections").select("*").eq("user_id", uid),
    supabase.from("collection_items").select("*").eq("user_id", uid),
    supabase.from("collection_members").select("*").eq("user_id", uid)
  ]);
  for(var i=0;i<res.length;i++){ if(res[i].error && i<3) throw res[i].error; }
  state.items = (res[0].data||[]).map(rowToItem);
  state.playlists = (res[1].data||[]).map(rowToColl).sort(collSort);
  state.links = (res[2].data||[]).map(rowToLink);
  /* só participações ACEITAS entram em "Coleções que participo". status pode
     não existir ainda (migração não rodada) → default "accepted" mantém o
     comportamento antigo. Convites pendentes aparecem na Central de
     Notificações, não aqui. */
  var memberIds = (res[3].data||[]).filter(function(r){ return (r.status||"accepted")!=="pending"; }).map(function(r){ return r.collection_id; }).filter(function(id){ return !state.playlists.some(function(p){return p.id===id;}); });
  state.memberPlaylists = [];
  if(memberIds.length){
    try{
      var mr = await supabase.from("collections").select("*").in("id", memberIds);
      var owners = (mr.data||[]).map(function(c){ return c.user_id; });
      var pr = owners.length ? await supabase.from("profiles").select("id,username,display_name,avatar_url").in("id", owners) : {data:[]};
      var profById={}; (pr.data||[]).forEach(function(p){ profById[p.id]=p; });
      state.memberPlaylists = (mr.data||[]).map(function(c){ var pl=rowToColl(c); pl.owner=profById[c.user_id]||null; return pl; });
    }catch(e){ state.memberPlaylists=[]; }
  }
}

async function ensureProfile(){
  var uid = state.user.id;
  var got = await supabase.from("profiles").select("*").eq("id", uid).maybeSingle();
  if(got.data){ state.profile = got.data; return; }
  var base = (pendingUsername || (state.user.email||"").split("@")[0] || "user").toLowerCase().replace(/[^a-z0-9_]/g,"").slice(0,20);
  if(!base) base = "user" + Math.floor(Math.random()*9999);
  var display = pendingDisplay || base;
  var ins = await supabase.from("profiles").insert({ id: uid, username: base, display_name: display }).select().single();
  if(ins.error){
    var taken = (ins.error.code==="23505") || ((ins.error.message||"").toLowerCase().indexOf("duplicate")>=0);
    if(taken){
      base = base + Math.floor(Math.random()*9999);
      var retry = await supabase.from("profiles").insert({ id: uid, username: base, display_name: display }).select().single();
      state.profile = retry.data || { id:uid, username:base, display_name:display };
    } else {
      state.profile = { id:uid, username:base, display_name:display };
    }
  } else {
    state.profile = ins.data;
  }
  pendingUsername = null; pendingDisplay = null;
}

function movePl(pl, dir){

  var a=arr[idx], b=arr[swap];
  var ao=(a.sortOrder==null?(idx+1)*10:a.sortOrder), bo=(b.sortOrder==null?(swap+1)*10:b.sortOrder);
  a.sortOrder=bo; b.sortOrder=ao;

async function loadPlaylistRoster(pl){
  var cid=pl.id;

      supabase.from("collection_items").select("*").eq("collection_id",cid),
      supabase.from("collection_members").select("*").eq("collection_id",cid)
    ]);
    if(!state.plRoster || state.plRoster.collectionId!==cid) return;
    var linkRows=res[0].data||[];
    var memberRows=res[1].data||[];
    var itemIds=linkRows.map(function(l){return l.item_id;});
    var itemsData=[];
    if(itemIds.length){ var ir=await supabase.from("items").select("*").in("id",itemIds); itemsData=(ir.data||[]).map(rowToItem); }
    if(!state.plRoster || state.plRoster.collectionId!==cid) return;
    var contribByItem={}; linkRows.forEach(function(l){ contribByItem[l.item_id]=l.user_id; });
    var items=itemsData.map(function(it){ return Object.assign({},it,{ __contributor: contribByItem[it.id]||null }); });
    var statusById={}; memberRows.forEach(function(m){ statusById[m.user_id]=m.status||"accepted"; });
    var memberIds=memberRows.map(function(m){return m.user_id;});
    var ownerId=pl.owner?pl.owner.id:state.user.id;
    var idSet={}; memberIds.concat(Object.keys(contribByItem).map(function(k){return contribByItem[k];})).concat([ownerId]).forEach(function(id){ if(id) idSet[id]=1; });
    var profileIds=Object.keys(idSet);
    var pr = profileIds.length ? await supabase.from("profiles").select("id,username,display_name,avatar_url").in("id",profileIds) : {data:[]};
    if(!state.plRoster || state.plRoster.collectionId!==cid) return;
    var profById={}; (pr.data||[]).forEach(function(p){ profById[p.id]=p; });
    state.plRoster={
      collectionId:cid, loading:false, error:false, items:items,
      members: memberIds.map(function(id){ var p=profById[id]||{id:id,username:"?"}; return Object.assign({}, p, { __pending: statusById[id]==="pending" }); }),
      owner: pl.owner ? pl.owner : (profById[state.user.id]||state.profile),
      profById: profById, inviteQ:"", inviteResults:[], inviteBusy:false, inviteOpen:false
    };
    render();
  }catch(e){
    if(state.plRoster && state.plRoster.collectionId===cid){ state.plRoster.loading=false; state.plRoster.error=true; render(); }

function cwMemberInsert(collectionId, userId){
  var run=function(withStatus){ var row={ collection_id:collectionId, user_id:userId }; if(withStatus) row.status="pending"; return supabase.from("collection_members").insert(row); };
  Promise.resolve(run(true)).then(function(res){
    if(res && res.error && /column|schema/i.test(String(res.error.message||""))){ cw(run(false)); }
    else if(res && res.error){ console.error("Supabase:", res.error.message); }
  }).catch(function(e){ console.error("Supabase:", e); });
}

function stripHtml(s){ return String(s).replace(/<br\s*\/?>/gi,"\n").replace(/<[^>]+>/g,"").replace(/&amp;/g,"&").replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g," ").trim(); }
var META_TIMER=null;
async function metaSearch(type, q){
  q=(q||"").trim(); if(!q) return [];
  if(type==="book"){
    var enc=encodeURIComponent;
    var urls=[
      "https://www.googleapis.com/books/v1/volumes?q="+enc(q)+"&langRestrict="+booksLang()+"&printType=books&maxResults=10",
      "https://www.googleapis.com/books/v1/volumes?q="+enc(q)+"&printType=books&maxResults=10",
      "https://openlibrary.org/search.json?q="+enc(q)+"&limit=10&fields=title,author_name,first_publish_year,cover_i,key"
    ];
    var rs=await Promise.all(urls.map(function(u){ return fetch(u).then(function(r){ return r.json(); }).catch(function(){ return null; }); }));
    var mapG=function(v){
      var vi=v.volumeInfo||{};
      var img=(vi.imageLinks && (vi.imageLinks.thumbnail||vi.imageLinks.smallThumbnail))||"";
      return { gbId:v.id, lang:vi.language||"", title:vi.title||"", name:(vi.authors&&vi.authors.join(", "))||"", year:(vi.publishedDate||"").slice(0,4), cover: img.replace(/^http:/,"https:"), synopsis: stripHtml(vi.description||"") };
    };

    g1.forEach(push);
    g2.filter(function(r){ return r.lang==="pt"; }).forEach(push);
    g2.forEach(push);
    ((((rs[2]||{}).docs))||[]).forEach(function(b){
      push({ workKey:b.key||"", title:b.title||"", name:(b.author_name&&b.author_name[0])||"", year:b.first_publish_year||"", cover: b.cover_i?("https://covers.openlibrary.org/b/id/"+b.cover_i+"-M.jpg"):"", synopsis:"" });
    });

  } else if(type==="tv"){
    if(!TMDB_KEY) { var e2=new Error("nokey"); e2.nokey=true; throw e2; }

    var put="https://api.themoviedb.org/3/search/person?api_key="+TMDB_KEY+"&language="+tmdbLang()+"&include_adult=false&query="+encodeURIComponent(q);
    var rts=await Promise.all([ fetch(ut).then(function(r){return r.json();}).catch(function(){return null;}), fetch(put).then(function(r){return r.json();}).catch(function(){return null;}) ]);
    var outT=[], seenT={};
    var pushT=function(m, seed){ if(!m.id || seenT[m.id]) return; seenT[m.id]=1; outT.push({ tvId:m.id, title:m.name, name:seed||"", year:(m.first_air_date||"").slice(0,4), cover: m.poster_path?("https://image.tmdb.org/t/p/w342"+m.poster_path):"", synopsis:(m.overview||""), pop:m.popularity||0 }); };
    (((rts[0]||{}).results)||[]).forEach(function(m){ pushT(m,""); });
    (((rts[1]||{}).results)||[]).slice(0,2).forEach(function(p){ (p.known_for||[]).forEach(function(k){ if(k.media_type==="tv") pushT(k, p.name); }); });
    return outT.slice(0,8);
  } else {
    if(!TMDB_KEY) { var e=new Error("nokey"); e.nokey=true; throw e; }
    var u="https://api.themoviedb.org/3/search/movie?api_key="+TMDB_KEY+"&language="+tmdbLang()+"&include_adult=false&query="+encodeURIComponent(q);
    var pu="https://api.themoviedb.org/3/search/person?api_key="+TMDB_KEY+"&language="+tmdbLang()+"&include_adult=false&query="+encodeURIComponent(q);
    var rms=await Promise.all([ fetch(u).then(function(r){return r.json();}).catch(function(){return null;}), fetch(pu).then(function(r){return r.json();}).catch(function(){return null;}) ]);
    var outM=[], seenM={};
    var pushM=function(m, seed){ if(!m.id || seenM[m.id]) return; seenM[m.id]=1; outM.push({ id:m.id, title:m.title, name:seed||"", year:(m.release_date||"").slice(0,4), cover: m.poster_path?("https://image.tmdb.org/t/p/w342"+m.poster_path):"", synopsis:(m.overview||""), pop:m.popularity||0 }); };
    (((rms[0]||{}).results)||[]).forEach(function(m){ pushM(m,""); });
    (((rms[1]||{}).results)||[]).slice(0,2).forEach(function(p){ (p.known_for||[]).forEach(function(k){ if(k.media_type==="movie") pushM(k, p.name); }); });

/* Resolve os metadados de uma obra a partir de um resultado de busca, SEM tocar
   em estado — devolve um objeto simples. Usado tanto pelo "escolher da busca"
   (pickMeta) quanto pelo auto-preenchimento e pelo botão de atualizar acervo.
   O gênero é buscado sempre (não fica mais atrás da sinopse), corrigindo o caso
   em que livros do Google Books nunca recebiam categoria. */
async function resolveMeta(type, res){
  var out={ subtitle: res.name||"" };
  if(type==="movie"){
    var mm = res.id ? await fetchMovieMeta(res.id) : {};
    out.subtitle=[mm.sub, res.year].filter(Boolean).join(", ");
    out.tmdb_id=res.id||null;
    out.release_year=res.year?parseInt(res.year,10):null;
    out.original_title=mm.original_title||res.title||"";
    out.genres=(mm.genres||[]).map(trGenre).filter(Boolean);
    out.creators=mm.creators||[];
    out.runtime=mm.runtime||null;
    if(res.synopsis) out.synopsis=res.synopsis;
  } else if(type==="tv"){
    var tm = res.tvId ? await fetchTvMeta(res.tvId) : {};
    out.subtitle=[tm.sub, res.year].filter(Boolean).join(", ");
    out.tmdb_id=res.tvId||null;
    out.release_year=res.year?parseInt(res.year,10):null;
    out.original_title=tm.original_title||res.title||"";
    out.genres=(tm.genres||[]).map(trGenre).filter(Boolean);
    out.creators=tm.creators||[];
    out.runtime=tm.runtime||null;
    if(res.synopsis) out.synopsis=res.synopsis;
  } else {
    out.subtitle=[res.name, res.year].filter(Boolean).join(", ");
    out.google_books_id=res.gbId||null;
    out.open_library_key=res.workKey||null;
    out.release_year=res.year?parseInt(String(res.year).slice(0,4),10):null;
    out.original_title=res.title||"";
    out.genres=[];
    if(res.name) out.creators=[res.name];
    if(res.synopsis) out.synopsis=res.synopsis;
    if(res.gbId){
      try{
        var wr=await fetch("https://www.googleapis.com/books/v1/volumes/"+res.gbId);
        var wd=await wr.json();
        var vinf=(wd.volumeInfo)||{};
        var desc=vinf.description||"";
        if(desc && !out.synopsis) out.synopsis=stripHtml(desc);
        if(vinf.pageCount) out.page_count=vinf.pageCount;
        if(vinf.categories && vinf.categories.length) out.genres=vinf.categories.map(trGenre).filter(Boolean);
        (vinf.industryIdentifiers||[]).forEach(function(ii){ if(ii.type==="ISBN_13") out.isbn13=ii.identifier; });
      }catch(e){}
    }
    else if(res.workKey){
      try{
        var or_=await fetch("https://openlibrary.org"+res.workKey+".json");
        var od=await or_.json();
        var odesc=od.description;
        if(odesc && typeof odesc==="object") odesc=odesc.value;
        if(odesc && !out.synopsis) out.synopsis=String(odesc).replace(/\r/g,"").split("----------")[0].trim();
        if((!out.genres||!out.genres.length) && Array.isArray(od.subjects) && od.subjects.length){
          /* Open Library mistura temas soltos ("Reminiscing in old age") junto
             com gêneros de verdade — só aceita os que reconhecemos e traduzimos;
             o resto é descartado (nunca vaza em inglês). */
          out.genres=od.subjects.map(trGenre).filter(Boolean).slice(0,3);
        }
      }catch(e){}
    }
  }
  if(res.cover) out.cover=res.cover;
  return out;
}
var META_APPLY=["tmdb_id","google_books_id","open_library_key","isbn13","release_year","original_title","genres","creators","runtime","page_count"];
/* auto=true: preenche sozinho com o melhor palpite ao digitar — preserva o que
   o usuário digitou/editou (só completa campos visíveis vazios) e mantém a
   lista de resultados visível pra ele trocar. auto ausente: escolha manual,
   aplica tudo e fecha a lista. */
async function pickMeta(res, auto){
  var im=state.itemModal; if(!im) return;
  var type=im.draft.type;
  var m=await resolveMeta(type, res);
  if(!state.itemModal || state.itemModal!==im || im.draft.type!==type) return;
  var d=im.draft;
  META_APPLY.forEach(function(k){ if(k in m) d[k]=m[k]; });
  if(auto){
    im._autoFilled=im._autoFilled||{};
    if(m.subtitle && (!d.subtitle || im._autoFilled.subtitle)){ d.subtitle=m.subtitle; im._autoFilled.subtitle=true; }
    if(m.cover && (!d.cover || im._autoFilled.cover)){ d.cover=m.cover; im._autoFilled.cover=true; }
    if(m.synopsis && (!d.synopsis || im._autoFilled.synopsis)){ d.synopsis=m.synopsis; im._autoFilled.synopsis=true; }
    im.autoPickedTitle=res.title||"";
  } else {
    d.title=res.title||d.title;
    if("subtitle" in m) d.subtitle=m.subtitle||"";
    if(m.cover) d.cover=m.cover;
    if(m.synopsis) d.synopsis=m.synopsis;
    im.search=null;
    im.autoPickedTitle=null;
    im._autoFilled={};
  }
  render();
}
/* ===== Atualizar metadados do acervo existente (backfill) ===== */
function itemNeedsMeta(it){ return !it.genres || !it.genres.length; }
/* Itens que já passaram por uma tentativa de preenchimento (localStorage, mesmo
   padrão do sino/feed). Alguns itens simplesmente não têm gênero achável hoje
   (livro de nicho cujo assunto não está no dicionário de tradução, título com
   erro de digitação que a busca não casa, ou cota do Google Books esgotada no
   dia). Sem isso, o banner cutucava eternamente esses casos, dando impressão de
   que o botão não funciona. O botão continua tentando TODOS os sem-gênero quando
   clicado — o "já tentei" só controla o alerta automático. */
function metaTriedSet(){
  try{ var a=JSON.parse(localStorage.getItem("av_meta_tried")||"[]"); var s={}; a.forEach(function(id){ s[id]=1; }); return s; }
  catch(e){ return {}; }
}
function markMetaTried(ids){
  try{
    var s=metaTriedSet(); ids.forEach(function(id){ s[id]=1; });
    localStorage.setItem("av_meta_tried", JSON.stringify(Object.keys(s)));
  }catch(e){}
}
/* Varre os itens sem gênero, busca cada um pelo título e preenche gênero/
   diretor/ids a partir do melhor resultado que combine com o título. Só PREENCHE
   campos vazios (nunca sobrescreve o que já existe, nem toca em título, capa,
   nota ou observação). Sequencial e com pausa curta entre itens, pra não estourar
   as APIs. Ao final, marca todos os tentados — mesmo os que não deram gênero — pra
   o banner parar de cutucar casos que não têm como ser preenchidos. */
async function backfillMeta(){
  if(state.backfill && state.backfill.running) return;
  var pending=state.items.filter(itemNeedsMeta);
  state.backfill={ running:true, total:pending.length, done:0, updated:0 };
  render();
  var triedIds=[];
  for(var i=0;i<pending.length;i++){
    var it=pending[i];
    triedIds.push(it.id);
    try{
      var results=await metaSearch(it.type, it.title);
      if(results && results.length){
        var want=normTitle(it.title);
        var top=null;
        for(var j=0;j<results.length;j++){
          var rt=normTitle(results[j].title||"");
          if(rt && (rt===want || rt.indexOf(want)>=0 || want.indexOf(rt)>=0)){ top=results[j]; break; }
        }
        if(top){
          var m=await resolveMeta(it.type, top);
          if(m){
            var changed=false;
            META_APPLY.forEach(function(k){
              if(!(k in m)) return;
              var v=m[k];
              if(v==null) return;
              if(Array.isArray(v) && !v.length) return;
              var was=it[k];
              if(!(was==null || (Array.isArray(was) && !was.length) || was==="")) return; /* só preenche vazio */
              it[k]=v; changed=true;
            });
            if(changed) cwItemWrite(metaPayload(it), it.id);
            if(it.genres && it.genres.length) state.backfill.updated++;
          }
        }
      }
    }catch(e){}
    state.backfill.done++;
    render();
    await new Promise(function(r){ setTimeout(r, 150); });
  }
  markMetaTried(triedIds);
  state.backfill.running=false;
  render();
}

/* ===== Descobrir (recomendações) ===== */
function normTitle(s){ return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g," ").trim(); }
/* Identidade estável de uma obra entre usuários diferentes.
   Usa o ID externo (TMDB/Google Books/Open Library) quando existe;
   cai para tipo+título normalizado quando o item não tem ID (ex.:
   comentário digitado à mão, sem escolher da biblioteca). */
function workKey(item){
  if(!item) return null;
  if(item.__key) return item.__key;
  var t=item.type||"movie";
  if(item.tmdb_id) return t+"|tmdb:"+item.tmdb_id;
  if(item.google_books_id) return t+"|gb:"+item.google_books_id;
  if(item.open_library_key) return t+"|ol:"+item.open_library_key;
  return t+"|t:"+normTitle(item.title);
}
/* Acha, no acervo do próprio usuário, um item já existente que representa a
   mesma obra do rascunho. Como a maioria dos itens antigos não tem ID externo
   salvo, não dá pra confiar só no workKey (ID contra título nunca casa). Aqui
   consideramos duplicata se, dentro do mesmo tipo, bater QUALQUER sinal: ID do
   TMDB, ID do Google Books, chave do Open Library, ou o título normalizado. */
function findDuplicateItem(draft, excludeId){
  var t=draft.type||"movie";
  var dTmdb=draft.tmdb_id, dGb=draft.google_books_id, dOl=draft.open_library_key;
  var dTitle=normTitle(draft.title);
  for(var i=0;i<state.items.length;i++){
    var it=state.items[i];
    if(excludeId && it.id===excludeId) continue;
    if((it.type||"movie")!==t) continue;
    if(dTmdb && it.tmdb_id && String(it.tmdb_id)===String(dTmdb)) return it;
    if(dGb && it.google_books_id && it.google_books_id===dGb) return it;
    if(dOl && it.open_library_key && it.open_library_key===dOl) return it;
    if(dTitle && normTitle(it.title)===dTitle) return it;
  }
  return null;
}
function titleCompare(a,b){ return String(a||"").localeCompare(String(b||""), state.lang==="en"?"en":"pt-BR", {sensitivity:"base",numeric:true}); }
function SortToggle(current, options, onChange){
  var row=el("div",{ "class":"av-sorttoggle" });
  options.forEach(function(opt){
    row.appendChild(el("button",{ "class":"av-sortbtn"+(current===opt.key?" on":""), onclick:function(){ onChange(opt.key); } }, opt.label));
  });

}
/* ===== Compatibilidade de gosto =====
   Escala de nota 1–5. A pontuação final é a média ponderada de uma
   lista de "sinais" (COMPAT_SIGNALS, abaixo) — cada sinal devolve um
   número de 0 a 1, ou null quando não há dado suficiente para aquele
   par de pessoas. Sinais indisponíveis são excluídos e os pesos dos
   demais são renormalizados automaticamente, então dá pra adicionar
   um sinal novo (ex.: coleções em comum, dados de uma futura IA de
   recomendação) só inserindo mais um item na lista abaixo — nada
   mais no algoritmo precisa mudar.
   Cada pessoa precisa ter pelo menos 3 obras avaliadas (não precisam
   ser as mesmas obras) para o cálculo rodar. Gostos totalmente opostos
   em tudo que é avaliável dão 0%; nada em comum e sem sinal disponível
   dá "sem dados" (null), não um número inventado. */
var COMPAT_SIGNALS = [
  { key:"ratings",  label:"notas em comum",             weight:0.55, compute:function(ctx){ return ctx.common.length>=3 ? ctx.ratingSim : null; } },
  { key:"genres",   label:"afinidade de gênero",        weight:0.20, compute:function(ctx){ return ctx.haveGenres ? ctx.genreSim : null; } },
  { key:"creators", label:"autores/diretores em comum", weight:0.15, compute:function(ctx){ return ctx.haveCreators ? ctx.creatorSim : null; } },
  { key:"types",    label:"equilíbrio entre tipos",     weight:0.10, compute:function(ctx){ return ctx.typeBal; } }
];
function computeCompatScore(ctx){
  var totalW=0, sum=0;
  COMPAT_SIGNALS.forEach(function(s){
    var v=s.compute(ctx); if(v==null) return;
    v=Math.max(0,Math.min(1,v));
    sum+=v*s.weight; totalW+=s.weight;
  });
  return totalW>0 ? sum/totalW : null;
}
function ratedKey(i){ return i.type+"|"+normTitle(i.title); }
function typeDist(list){
  var t={movie:0,tv:0,book:0}, n=list.length||1;
  list.forEach(function(i){ if(t[i.type]!=null) t[i.type]++; });
  return { movie:t.movie/n, tv:t.tv/n, book:t.book/n };
}
function genreProfile(list){ var f={}; list.forEach(function(i){ (i.genres||[]).forEach(function(g){ g=trGenre(g); if(!g) return; g=g.toLowerCase(); f[g]=(f[g]||0)+1; }); }); return f; }
function creatorProfile(list){ var f={}; list.forEach(function(i){ (i.creators||[]).forEach(function(c){ c=String(c).toLowerCase().trim(); if(c) f[c]=(f[c]||0)+1; }); }); return f; }
function cosineSim(a,b){
  var keys={}, k; for(k in a) keys[k]=1; for(k in b) keys[k]=1;
  var dot=0,na=0,nb=0;
  for(k in keys){ var x=a[k]||0,y=b[k]||0; dot+=x*y; na+=x*x; nb+=y*y; }
  return (na&&nb)? dot/(Math.sqrt(na)*Math.sqrt(nb)) : 0;
}
function topShared(profA, profB, n){
  return Object.keys(profA).filter(function(k){ return profB[k]; })
    .sort(function(x,y){ return (profA[y]+profB[y])-(profA[x]+profB[x]); }).slice(0,n)
    .map(function(g){ return g.charAt(0).toUpperCase()+g.slice(1); });
}
function tasteCompat(mine, theirs){
  var myRated=(mine||[]).filter(function(i){ return i.rating>0; });
  var thRated=(theirs||[]).filter(function(i){ return i.rating>0; });
  if(myRated.length<3 || thRated.length<3) return null;
  var byMe={}; myRated.forEach(function(i){ byMe[ratedKey(i)]=i; });
  var common=[];
  thRated.forEach(function(i){ var m=byMe[ratedKey(i)]; if(m) common.push({ title:i.title, type:i.type, mine:m.rating, theirs:i.rating, diff:Math.abs(m.rating-i.rating) }); });
  var simSum=0; common.forEach(function(c){ simSum += 1 - c.diff/4; });
  var ratingSim=common.length ? simSum/common.length : 0;
  var a=typeDist(myRated), b=typeDist(thRated);
  var l1=Math.abs(a.movie-b.movie)+Math.abs(a.tv-b.tv)+Math.abs(a.book-b.book);
  var typeBal=1 - l1/2;
  var gA=genreProfile(myRated), gB=genreProfile(thRated);
  var haveGenres = Object.keys(gA).length>0 && Object.keys(gB).length>0;
  var cA=creatorProfile(myRated), cB=creatorProfile(thRated);
  var haveCreators = Object.keys(cA).length>0 && Object.keys(cB).length>0;

    haveGenres:haveGenres, genreSim: haveGenres?cosineSim(gA,gB):0,
    haveCreators:haveCreators, creatorSim: haveCreators?cosineSim(cA,cB):0 };
  var score=computeCompatScore(ctx);
  if(score==null) return null;
  var pct=Math.max(0,Math.min(100,Math.round(100*score)));
  var shared = haveGenres ? topShared(gA,gB,4) : [];
  var sharedCreators = haveCreators ? topShared(cA,cB,3) : [];
  var agree=common.filter(function(c){ return c.diff<=1 && c.mine>=4 && c.theirs>=4; })
    .sort(function(x,y){ return (y.mine+y.theirs)-(x.mine+x.theirs); }).slice(0,3);
  var diverge=common.filter(function(c){ return c.diff>=2; })
    .sort(function(x,y){ return y.diff-x.diff; }).slice(0,3);

  var favCommon=[]; (theirs||[]).forEach(function(i){ if(i.is_favorite && favMine[ratedKey(i)]) favCommon.push(i.title); });
  return { pct:pct, common:common.length, agree:agree, diverge:diverge, shared:shared, sharedCreators:sharedCreators, favs:favCommon.slice(0,3) };
}
/* ===== Taste Graph =====
   Rede de compatibilidade entre você e as pessoas que você segue
   (e entre elas também, não só ligadas a você). Reusa tasteCompat
   — qualquer sinal novo adicionado em COMPAT_SIGNALS aparece aqui
   automaticamente, sem precisar mexer nesta tela. */
function openTasteGraph(){
  state.screen="tastegraph";
  state.tasteGraph={ loading:true, error:false, people:[], edges:[], empty:false };
  render();
  loadTasteGraph();
}
async function loadTasteGraph(){
  var tg=state.tasteGraph; if(!tg) return;
  try{
    var followIds=(state.following||[]).slice(0,40);
    if(!followIds.length){ state.tasteGraph={ loading:false, error:false, people:[], edges:[], empty:true }; render(); return; }
    var res=await Promise.all([
      supabase.from("items").select("user_id,type,title,rating,genres,is_favorite").in("user_id",followIds).eq("is_private",false).limit(4000),
      supabase.from("profiles").select("id,username,display_name,avatar_url").in("id",followIds)
    ]);
    if(state.screen!=="tastegraph") return;
    var itemsByUser={};
    (res[0].data||[]).forEach(function(r){ (itemsByUser[r.user_id]=itemsByUser[r.user_id]||[]).push({ type:r.type, title:r.title, rating:r.rating, genres:Array.isArray(r.genres)?r.genres:[], is_favorite:!!r.is_favorite }); });
    itemsByUser[state.user.id]=state.items;
    var meProf={ id:state.user.id, username:(state.profile&&state.profile.username)||"você", display_name:state.profile&&state.profile.display_name, avatar_url:state.profile&&state.profile.avatar_url, isMe:true };
    var people=[meProf].concat((res[1].data||[]).map(function(p){ return Object.assign({},p,{isMe:false}); }));
    var edges=[];
    for(var i=0;i<people.length;i++){
      for(var j=i+1;j<people.length;j++){
        var c=tasteCompat(itemsByUser[people[i].id]||[], itemsByUser[people[j].id]||[]);
        if(c) edges.push({ a:i, b:j, pct:c.pct, common:c.common });
      }
    }
    state.tasteGraph={ loading:false, error:false, people:people, edges:edges, empty:false };
    render();
  }catch(e){
    if(state.tasteGraph){ state.tasteGraph.loading=false; state.tasteGraph.error=true; render(); }
  }
}

async function loadDiscover(force){

  if(dv.loading || (dv.loaded && !force)) return;
  dv.loading=true; dv.error=""; render();
  var anyError=false;
  {

    var seedM=state.items.filter(function(i){ return i.type==="movie" && i.status==="done"; }).sort(byRating).slice(0,3);
    var films=[], seenF={};
    try{
    for(var i=0;i<seedM.length;i++){
      var recs=await tmdbRecsFor(seedM[i].title);
      recs.slice(0,10).forEach(function(m){

    var seedT=state.items.filter(function(i){ return i.type==="tv" && i.status==="done"; }).sort(byRating).slice(0,3);
    var series=[], seenT={};
    try{
    for(var k=0;k<seedT.length;k++){

    dv.series=series.slice(0,12);
    var allDoneB=state.items.filter(function(i){ return i.type==="book" && i.status==="done"; }).sort(byRating);
    var bookPool=state.items.filter(function(i){ return i.type==="book"; }).sort(function(a,b){
      var rank={done:0,doing:1,wish:2}, ra=rank[a.status]==null?3:rank[a.status], rb=rank[b.status]==null?3:rank[b.status];
      if(ra!==rb) return ra-rb; return (b.rating||0)-(a.rating||0);
    });
    var authors=[], genreSeeds=[];
    bookPool.forEach(function(b){
      var a=(b.subtitle||"").split(",")[0].trim();
      if(a && !/^\d+$/.test(a) && authors.indexOf(a)<0) authors.push(a);
      (b.creators||[]).forEach(function(c){ c=String(c).trim(); if(c && authors.indexOf(c)<0) authors.push(c); });
      (b.genres||[]).forEach(function(g){ g=String(g).trim(); if(g && genreSeeds.indexOf(g)<0) genreSeeds.push(g); });
    });
    /* se faltar autor no cadastro, descobre autor e gênero pelo título via Google Books */
    if(authors.length<2){

        var vi=v.volumeInfo||{}; var nt=normTitle(vi.title);
        if(!vi.title || seenB[nt] || owned[nt]) return;
        seenB[nt]=1;
        seedCounts[seedName]=(seedCounts[seedName]||0)+1;

        books.push({ title:vi.title, sub:[(vi.authors&&vi.authors[0])||seedName, (vi.publishedDate||"").slice(0,4)].filter(Boolean).join(", "), cover:img.replace(/^http:/,"https:"), synopsis:stripHtml(vi.description||""), seed:seedName });
      });
    };
    for(var j=0;j<authors.length;j++){

      try{

      }catch(eb){ anyError=true; }
    }
    /* plano B: sugerir pelos gêneros dos livros do usuário — roda sempre que houver

    if(genreSeeds.length){

          var cd=await cq.json();

          if(!cat) continue;
          var sq=await fetch("https://www.googleapis.com/books/v1/volumes?q="+encodeURIComponent('subject:"'+cat+'"')+"&langRestrict="+booksLang()+"&printType=books&orderBy=relevance&maxResults=10");
          collect(await sq.json(), catSeeds[C].title);

          var od=await orr.json();

        }catch(eo){ anyError=true; }
      }
    }
    /* plano E: último recurso — relacionados ao livro mais relevante do usuário */
    if(books.length<3 && bookPool.length){
      var seedBk=bookPool[0];
      try{ var fr=await fetch("https://www.googleapis.com/books/v1/volumes?q="+encodeURIComponent(seedBk.title)+"&printType=books&maxResults=20"); collect(await fr.json(), seedBk.title); }catch(ef){ anyError=true; }
      if(books.length<3){
        try{ var fo=await fetch("https://openlibrary.org/search.json?q="+encodeURIComponent(seedBk.title)+"&limit=15"); var fod=await fo.json(); ((fod&&fod.docs)||[]).forEach(function(d){ olPush(d, seedBk.title); }); }catch(ef2){ anyError=true; }
      }
    }
    dv.books=books.slice(0,12);
    dv.bookNote="sementes — autores: "+(authors.length?authors.join(", "):"nenhum")+(genreSeeds.length?(" · gêneros: "+genreSeeds.join(", ")):"")+" · livros no acervo: "+bookPool.length+" · resultados: "+books.length+" · por semente: "+(Object.keys(seedCounts).map(function(k){return k+"="+seedCounts[k];}).join(", ")||"—")+(anyError?" · houve erro de rede":"");

    /* Sinal novo: obras que quem você segue concluiu e avaliou bem (nota >=4),

    var friendFilms=[], friendSeries=[], friendBooks=[];

async function loadSuggestions(force){
  var sg=state.suggest;
  if(sg.loading || (sg.loaded && !force)) return;
  sg.loading=true; render();
  try{
    var me=state.user.id;
    var mine={}; state.following.forEach(function(id){ mine[id]=1; });
    var score={}, why={};
    /* quem me segue e eu não sigo de volta */
    var fr=await supabase.from("follows").select("follower_id").eq("following_id", me).limit(200);
    (fr.data||[]).forEach(function(r){
      var id=r.follower_id;
      if(id===me || mine[id]) return;
      score[id]=1000; why[id]="segue você";
    });

    if(state.following.length){
      var ff=await supabase.from("follows").select("following_id").in("follower_id", state.following).limit(400);
      var counts={};
      (ff.data||[]).forEach(function(r){
        var id=r.following_id;

        counts[id]=(counts[id]||0)+1;
      });
      Object.keys(counts).forEach(function(id){
        if(score[id]){ score[id]+=counts[id]; }
        else{
          score[id]=counts[id];
          why[id]= state.lang==="en" ? ("followed by "+counts[id]+(counts[id]===1?" person you follow":" people you follow")) : ("seguido por "+counts[id]+(counts[id]===1?" pessoa que você segue":" pessoas que você segue"));
        }
      });
    }
    /* Sinal novo: compatibilidade de gosto (mesmo cálculo do Taste Graph/perfil,
       COMPAT_SIGNALS) com QUALQUER pessoa do app, não só quem já está a 1-2
       conexões de distância no grafo social — é o que permite achar gente
       parecida que você nunca teria encontrado só seguindo amigos de amigos. */
    try{
      var myRatedCount=state.items.filter(function(i){ return i.rating>0; }).length;
      if(myRatedCount>=3){
        var allP=await supabase.from("profiles").select("id").neq("id", me).limit(500);
        var candIds=(allP.data||[]).map(function(r){ return r.id; }).filter(function(id){ return !mine[id]; });
        if(candIds.length){
          var candItems=await supabase.from("items").select("user_id,type,rating,title,genres,creators").in("user_id",candIds).eq("is_private",false).gt("rating",0);
          var byUser={};
          (candItems.data||[]).forEach(function(r){ (byUser[r.user_id]=byUser[r.user_id]||[]).push(r); });
          Object.keys(byUser).forEach(function(id){
            var c=tasteCompat(state.items, byUser[id]);
            if(!c || c.pct<45) return;
            var bonus=c.pct*3;
            score[id]=(score[id]||0)+bonus;
            if(!why[id] || c.pct>=60){
              why[id]= state.lang==="en" ? (c.pct+"% taste match") : (c.pct+"% de compatibilidade de gosto");
            }
          });
        }
      }
    }catch(ec){}
    var ids=Object.keys(score).sort(function(a,b){ return score[b]-score[a]; }).slice(0,6);
    if(ids.length){
      var pr=await supabase.from("profiles").select("id,username,display_name,avatar_url").in("id", ids);
      var byId={}; (pr.data||[]).forEach(function(p){ byId[p.id]=p; });
      sg.people=ids.map(function(id){ var p=byId[id]; if(p) p._why=why[id]; return p; }).filter(Boolean);
    } else sg.people=[];
    sg.loaded=true;
  }catch(e){ sg.people=[]; sg.loaded=true; }
  sg.loading=false; render();
}

/* ===== Central de notificações =====
   Sem tabela nova no banco: computa tudo na hora a partir de tabelas que já
   existem (follows.created_at, collection_members.added_at, comments.parent_id),
   e usa localStorage pro "visto" — mesmo padrão já usado pelo sino da Rede
   (av_feed_seen) acima. Três tipos, na ordem do CLAUDE.md: novo seguidor,
   adicionado a uma coleção, resposta a um comentário seu. */
function notifSeenTs(){
  try{ return localStorage.getItem("av_notif_seen") || "1970-01-01T00:00:00Z"; }catch(e){ return "1970-01-01T00:00:00Z"; }
}

  state.notifNew=false;

async function checkNotifNews(){
  if(!state.user) return;
  var uid=state.user.id, seen=notifSeenTs();
  try{
    var q1=await supabase.from("follows").select("created_at").eq("following_id",uid).gt("created_at",seen).limit(1);
    if(q1.data && q1.data.length){ state.notifNew=true; render(); return; }
    var q2=await supabase.from("collection_members").select("added_at").eq("user_id",uid).gt("added_at",seen).limit(1);
    if(q2.data && q2.data.length){ state.notifNew=true; render(); return; }
    var myC=await supabase.from("comments").select("id").eq("user_id",uid);
    var ids=(myC.data||[]).map(function(r){ return r.id; });
    if(ids.length){
      var q3=await supabase.from("comments").select("id").in("parent_id",ids).neq("user_id",uid).gt("created_at",seen).limit(1);
      if(q3.data && q3.data.length){ state.notifNew=true; render(); }
    }
  }catch(e){}
}

/* Une os 3 tipos numa lista só, ordenada por data, resolvendo os perfis
   envolvidos (quem seguiu/respondeu/te adicionou) e o nome da coleção numa
   segunda leva de consultas — sem N+1, tudo em lotes por lista de IDs. */
async function loadNotifications(){
  var nm=state.notifModal; if(!nm) return;
  var uid=state.user.id;
  try{
    var followsRes=await supabase.from("follows").select("follower_id,created_at").eq("following_id",uid).order("created_at",{ascending:false}).limit(20);
    var followRows=followsRes.data||[];

    var membersRes=await supabase.from("collection_members").select("*").eq("user_id",uid).order("added_at",{ascending:false}).limit(20);
    var memberRows=membersRes.data||[];
    var collIds=memberRows.map(function(r){ return r.collection_id; });

    var myC=await supabase.from("comments").select("id").eq("user_id",uid);
    var myIds=(myC.data||[]).map(function(r){ return r.id; });
    var repliesRes = myIds.length
      ? await supabase.from("comments").select("id,user_id,body,created_at,work_key,item_type,title,spoiler").in("parent_id",myIds).neq("user_id",uid).order("created_at",{ascending:false}).limit(20)
      : {data:[]};
    var replyRows=repliesRes.data||[];

    var collRes = collIds.length ? await supabase.from("collections").select("id,name,user_id").in("id",collIds) : {data:[]};
    var collById={}; (collRes.data||[]).forEach(function(c){ collById[c.id]=c; });

    var actorIds={};
    followRows.forEach(function(r){ actorIds[r.follower_id]=1; });
    replyRows.forEach(function(r){ actorIds[r.user_id]=1; });
    (collRes.data||[]).forEach(function(c){ actorIds[c.user_id]=1; });
    var actorIdList=Object.keys(actorIds);
    var profById={};
    if(actorIdList.length){
      var pr=await supabase.from("profiles").select("id,username,display_name,avatar_url").in("id",actorIdList);
      (pr.data||[]).forEach(function(p){ profById[p.id]=p; });
    }

    if(!state.notifModal) return; // usuário fechou o modal enquanto carregava

    var seen=notifSeenTs();
    var list=[];
    followRows.forEach(function(r){
      list.push({ kind:"follow", ts:r.created_at, isNew:r.created_at>seen, actor:profById[r.follower_id]||null });
    });
    memberRows.forEach(function(r){
      var c=collById[r.collection_id];
      list.push({ kind:"collection", ts:r.added_at, isNew:r.added_at>seen, pending:(r.status||"accepted")==="pending", actor:c?(profById[c.user_id]||null):null, collectionId:r.collection_id, collectionName:c?c.name:"" });
    });
    replyRows.forEach(function(r){
      list.push({ kind:"reply", ts:r.created_at, isNew:r.created_at>seen, actor:profById[r.user_id]||null, body:r.body, workKey:r.work_key, itemType:r.item_type, title:r.title, spoiler:!!r.spoiler });
    });
    list.sort(function(a,b){ return (b.ts||"").localeCompare(a.ts||""); });

    nm.items=list.slice(0,40);
    nm.loading=false;
    markNotifSeen();
    render();
  }catch(e){
    nm.loading=false; nm.error="err"; render();
  }
}

  var pr = await supabase.from("profiles").select("*").eq("username", username).maybeSingle();
  /* protege contra resposta atrasada: se enquanto isso o usuário já navegou

     (mesmo padrão de guarda já usado em loadWork()). */
  if(!state.viewUser || state.viewUser.username!==username) return;
  if(!pr.data){ state.viewUser.loading=false; state.viewUser.notFound=true; render(); return; }
  var prof = pr.data;

  var collQ0=supabase.from("collections").select("*").eq("user_id", prof.id); if(!own) collQ0=collQ0.eq("is_public",true);
  var res = await Promise.all([
    itemsQ0,
    collQ0,
    supabase.from("collection_items").select("*").eq("user_id", prof.id),
    supabase.from("follows").select("follower_id", {count:"exact"}).eq("following_id", prof.id),
    supabase.from("follows").select("following_id", {count:"exact"}).eq("follower_id", prof.id),

    supabase.from("shares").select("*").eq("user_id", prof.id).order("created_at",{ascending:false}).limit(40)
  ]);
  if(!state.viewUser || state.viewUser.username!==username) return;
  var shares=(res[6].data||[]).map(rowToShare);

  try{
    var sids=shares.map(function(s){ return s.id; });
    if(sids.length){
      var lr=await supabase.from("share_likes").select("share_id,user_id").in("share_id", sids);
      if(!state.viewUser || state.viewUser.username!==username) return;
      /* monta a contagem nova num objeto à parte e só funde no cache global
         depois de confirmar que a resposta ainda é a atual — a busca acima
         já traz TODAS as curtidas dessas obras (recontagem completa), então
         dá pra substituir de vez em vez de somar em cima do que já estava em
         cache (do feed, ou de uma visita anterior) — sem isso, reabrir o
         mesmo perfil inflava a contagem a cada visita. */
      var freshLikes={};
      sids.forEach(function(sid){ freshLikes[sid]={ count:0, mine:false }; });
      (lr.data||[]).forEach(function(l){
        var e=freshLikes[l.share_id]; if(!e) return;
        e.count++; if(l.user_id===state.user.id) e.mine=true;
      });
      Object.keys(freshLikes).forEach(function(sid){ state.feed.likes[sid]=freshLikes[sid]; });
    }
  }catch(e_){}
  state.viewUser = {
    loading:false, profile:prof, tab:"acervo", commentType:"movie",
    items:(res[0].data||[]).map(rowToItem),
    playlists:(res[1].data||[]).map(rowToColl).sort(collSort),
    links:(res[2].data||[]).map(rowToLink),
    followers: (res[3].count!=null?res[3].count:(res[3].data||[]).length),
    followingCount: (res[4].count!=null?res[4].count:(res[4].data||[]).length),
    comments:(res[5].data||[]).map(rowToComment),
    shares:shares
  };
  render();
}

/* payload: { item_type, title, body, spoiler, parentId, key } -> retorna a linha inserida (rowToComment) ou lança erro */
async function postComment(payload){
  var id=newId();
  var row={ id:id, user_id:state.user.id, item_type:payload.item_type, title:payload.title, body:payload.body,
    spoiler:!!payload.spoiler, parent_id:payload.parentId||null, work_key:payload.key||null };
  var res=await supabase.from("comments").insert(row).select().single();
  if(res.error){
    var m=String(res.error.message||"");
    if(/column|schema/i.test(m)){
      delete row.spoiler; delete row.parent_id; delete row.work_key;
      res=await supabase.from("comments").insert(row).select().single();
    }
  }
  if(res.error) throw new Error(res.error.message||"Não foi possível salvar.");
  return rowToComment(res.data);
}
async function saveComment(){
  var cm=state.commentModal; var dr=cm.draft;
  if(!dr.title.trim() || !dr.body.trim()){ cm.error="Preencha o título e o comentário."; render(); return; }
  cm.busy=true; cm.error=""; render();
  var key = dr.pickedItem ? workKey(dr.pickedItem) : workKey({ type:dr.item_type, title:dr.title.trim() });
  var newComment;
  try{
    newComment = await postComment({ item_type:dr.item_type, title:dr.title.trim(), body:dr.body.trim(), spoiler:dr.spoiler, parentId:null, key:key });
  }catch(e){ cm.busy=false; cm.error=e.message||"Não foi possível salvar."; render(); return; }
  if(state.viewUser && isOwnProfile()){
    state.viewUser.comments.unshift(newComment);
    state.viewUser.commentType=dr.item_type; state.viewUser.tab="comentarios";
  }
  state.commentModal=null; render();
}
/* Excluir só pode de fato apagar linhas que o próprio usuário é dono (é o que
   a política de RLS permite) — respostas de OUTRAS pessoas ao seu comentário
   não são apagadas no servidor mesmo que a gente tente (a escrita simplesmente
   não afeta a linha, sem erro). Antes o código removia todas as respostas da
   tela, mesmo as que continuavam existindo no banco — cada uma delas ficava
   órfã e invisível para sempre. Agora só removemos da tela o que realmente
   será apagado no servidor: o comentário em si e as respostas que também são
   suas. */
function deleteComment(c){
  var mine=state.user.id;
  function stripMine(list){
    return (list||[]).filter(function(x){
      if(x.id===c.id) return false;
      if(x.parentId===c.id && x.user_id===mine) return false;
      return true;
    });
  }
  if(state.viewUser) state.viewUser.comments=stripMine(state.viewUser.comments);
  if(state.workView) state.workView.comments=stripMine(state.workView.comments);
  cw(supabase.from("comments").delete().eq("id",c.id));
  cw(supabase.from("comments").delete().eq("parent_id",c.id).eq("user_id",mine));
  render();
}
function deleteShare(s){
  if(state.viewUser && state.viewUser.shares) state.viewUser.shares=state.viewUser.shares.filter(function(x){return x.id!==s.id;});
  if(state.feed && state.feed.shares) state.feed.shares=state.feed.shares.filter(function(x){return x.id!==s.id;});
  cw(supabase.from("shares").delete().eq("id",s.id));
  render();
}

function openImport(){ state.importModal={ rows:null, type:"movie", busy:false, done:0, error:"" }; state._mo=true; render(); }
function parseCSV(text){
  var rows=[], row=[], cur="", inQ=false;
  for(var i=0;i<text.length;i++){
    var ch=text[i];
    if(inQ){
      if(ch==='"'){ if(text[i+1]==='"'){ cur+='"'; i++; } else inQ=false; }
      else cur+=ch;
    } else {
      if(ch==='"') inQ=true;
      else if(ch===","||ch===";"){ row.push(cur); cur=""; }
      else if(ch==="\n"){ row.push(cur); cur=""; if(row.some(function(c){return c.trim();})) rows.push(row); row=[]; }
      else if(ch!=="\r") cur+=ch;
    }
  }
  row.push(cur); if(row.some(function(c){return c.trim();})) rows.push(row);
  return rows;
}
function mapImport(rows){
  if(!rows.length) return [];
  var head=rows[0].map(function(h){ return normTitle(h); });
  var idx=function(names){ for(var i=0;i<head.length;i++){ if(names.indexOf(head[i])>=0) return i; } return -1; };
  var iT=idx(["name","title","titulo"]), iY=idx(["year","ano"]), iR=idx(["rating","nota"]), iA=idx(["author","autor","autores","director","diretor"]);
  if(iT<0) return [];
  var out=[];
  rows.slice(1).forEach(function(r){
    var t=(r[iT]||"").trim(); if(!t) return;
    var rating=0;
    if(iR>=0 && r[iR]){ var num=parseFloat(String(r[iR]).replace(",",".")); if(!isNaN(num)) rating=Math.max(0,Math.min(5,Math.round(num))); }
    var sub=[iA>=0?(r[iA]||"").trim():"", iY>=0?(r[iY]||"").trim():""].filter(Boolean).join(", ");
    out.push({ title:t, subtitle:sub, rating:rating });
  });
  return out;
}
async function runImport(){
  var m=state.importModal; if(!m || !m.rows || m.busy) return;
  m.busy=true; m.error=""; render();
  var owned={}; state.items.forEach(function(i){ owned[normTitle(i.title)+"|"+i.type]=1; });
  var todo=m.rows.filter(function(r){ return !owned[normTitle(r.title)+"|"+m.type]; });
  try{
    for(var i=0;i<todo.length;i+=50){
      var batch=todo.slice(i,i+50);
      var ids=batch.map(function(){ return newId(); });
      var chunk=batch.map(function(r,j){ return { id:ids[j], user_id:state.user.id, type:m.type, status:"done", title:r.title, subtitle:r.subtitle, cover:"", rating:r.rating, notes:"", synopsis:"" }; });
      var res=await supabase.from("items").insert(chunk);
      if(res.error) throw res.error;
      /* só entra no estado local depois do insert confirmar — senão um lote
         que falha deixa itens "fantasma" na tela que nunca foram salvos, e
         pior: na tentativa seguinte o dedup por título os trata como já
         existentes e nunca mais tenta importá-los de novo. */
      batch.forEach(function(r,j){
        state.items.unshift({ id:ids[j], createdAt:new Date().toISOString(), type:m.type, status:"done", title:r.title, subtitle:r.subtitle, cover:"", rating:r.rating, notes:"", synopsis:"" });
      });
      m.done+=chunk.length; render();
    }
    m.finished=true;
  }catch(e){ m.error="A importação parou no meio ("+m.done+" itens entraram). Tente de novo — os já importados não duplicam."; }
  m.busy=false; render();
}
function ImportModal(){
  var m=state.importModal;
  var close=function(){ state.importModal=null; render(); };
  var body=el("div",{ "class":"av-modalbody" });
  if(m.finished){
    body.appendChild(el("p",{ "class":"av-fbok" }, m.done+" itens importados para a sua biblioteca!"));
    return ModalShell("Importar", close, body, el("div",{ "class":"av-modalfoot" }, el("button",{ "class":"av-primary", onclick:close },"Fechar")));
  }
  body.appendChild(el("p",{ "class":"av-secsub" },"Traga sua lista do Letterboxd (exportação oficial em CSV) ou qualquer planilha CSV com colunas título, ano, nota e autor/diretor."));
  body.appendChild(el("label",{ "class":"av-label" },"Importar como"));
  body.appendChild(el("div",{ "class":"av-seg" }, seg("Filmes",m.type==="movie",function(){ m.type="movie"; render(); }), seg("Livros",m.type==="book",function(){ m.type="book"; render(); })));
  var fi=el("input",{ type:"file", accept:".csv,text/csv", "class":"av-input", onchange:function(e){
    var f=e.target.files && e.target.files[0]; if(!f) return;
    var rd=new FileReader();
    rd.onload=function(){ m.rows=mapImport(parseCSV(String(rd.result))); m.error=m.rows.length?"":"Não reconheci as colunas desse arquivo. Ele tem um cabeçalho com \"título\" ou \"name\"?"; render(); };
    rd.readAsText(f);
  }});
  body.appendChild(fi);
  if(m.rows && m.rows.length) body.appendChild(el("p",{ "class":"av-wishline" }, el("b",null,String(m.rows.length)), " itens prontos para importar como "+(m.type==="movie"?"filmes":"livros")+" concluídos."));
  if(m.busy) body.appendChild(el("p",{ "class":"av-wishline" },"importando… "+m.done));
  if(m.error) body.appendChild(el("p",{ "class":"av-metaerr" }, m.error));
  var foot=el("div",{ "class":"av-modalfoot" },
    el("button",{ "class":"av-ghost", onclick:close },"Cancelar"),
    el("button",{ "class":"av-primary", disabled:!(m.rows&&m.rows.length)||m.busy, onclick:runImport },"Importar")
  );
  return ModalShell("Importar", close, body, foot);
}

function openPicker(){ state.pickerModal={ type:"any", mood:"any", time:"any", result:null, last:null, empty:false }; state._mo=true; render(); }
function pickerPool(){ return state.items.filter(function(i){ var s=statusOf(i); return s==="wish"||s==="doing"; }); }
function pickerGenres(){
  var f={}; pickerPool().forEach(function(i){ (i.genres||[]).forEach(function(g){ g=trGenre(g); if(g) f[g]=(f[g]||0)+1; }); });
  return Object.keys(f).sort(function(a,b){ return f[b]-f[a]; }).slice(0,6);
}
function pickerCandidates(pm){
  var pool=pickerPool();
  if(pm.type!=="any") pool=pool.filter(function(i){ return i.type===pm.type; });
  if(pm.mood && pm.mood!=="any"){
    var nq=normTitle(pm.mood);
    var pref=pool.filter(function(i){ return (i.genres||[]).some(function(g){ return normTitle(trGenre(g)).indexOf(nq)>=0; }); });
    if(pref.length) pool=pref;
  }
  if(pm.time==="short"){
    var sh=pool.filter(function(i){ return i.runtime && i.runtime<=100; });
    if(sh.length) pool=sh;
  }
  return pool;
}
function pickerSuggest(){
  var pm=state.pickerModal; if(!pm) return;
  var pool=pickerCandidates(pm);
  if(!pool.length){ pm.result=null; pm.empty=true; render(); return; }
  pm.empty=false;
  var choices=pool.filter(function(i){ return !pm.last || i.id!==pm.last; });
  if(!choices.length) choices=pool;
  pm.result=choices[Math.floor(Math.random()*choices.length)];
  pm.last=pm.result.id;
  render();
}

async function loadShare(){
  var sh=state.share;
  if(sh.type==="collection"){
    var cr=await supabase.from("collections").select("*").eq("id", sh.id).maybeSingle();
    if(!cr.data){ sh.loading=false; sh.notFound=true; render(); return; }
    var res=await Promise.all([
      supabase.from("collection_items").select("*").eq("collection_id", sh.id),
      supabase.from("profiles").select("id,username,display_name,avatar_url").eq("id", cr.data.user_id).maybeSingle()
    ]);

    var ids=links.map(function(l){ return l.itemId; });
    var items=[];
    if(ids.length){ var ir=await supabase.from("items").select("*").in("id", ids); items=(ir.data||[]).map(rowToItem); }
    sh.loading=false; sh.collection=rowToColl(cr.data); sh.items=items; sh.owner=res[1].data; render();
  } else if(sh.type==="item"){
    var it=await supabase.from("items").select("*").eq("id", sh.id).maybeSingle();
    if(!it.data){ sh.loading=false; sh.notFound=true; render(); return; }
    var pr=await supabase.from("profiles").select("id,username,display_name,avatar_url").eq("id", it.data.user_id).maybeSingle();
    sh.loading=false; sh.item=rowToItem(it.data); sh.owner=pr.data; render();

/* ===== Avatar (foto da galeria ou gerado) ===== */
function genIdenticon(seed){
  try{
    var h=0; for(var i=0;i<seed.length;i++) h=(h*31+seed.charCodeAt(i))>>>0;
    var hue=h%360, size=160, cells=5, cell=size/cells;
    var c=document.createElement("canvas"); c.width=size; c.height=size;
    var ctx=c.getContext("2d"); if(!ctx) return null;
    ctx.fillStyle="hsl("+hue+",28%,20%)"; ctx.fillRect(0,0,size,size);
    ctx.fillStyle="hsl("+hue+",58%,62%)";
    var rnd=h||1;
    function bit(){ rnd=(rnd*1103515245+12345)&0x7fffffff; return (rnd>>17)&1; }
    for(var x=0;x<3;x++) for(var y=0;y<cells;y++){ if(bit()){ ctx.fillRect(x*cell,y*cell,cell,cell); ctx.fillRect((cells-1-x)*cell,y*cell,cell,cell); } }
    return c.toDataURL("image/png");
  }catch(e){ return null; }
}
function fileToAvatar(file, cb){
  if(!file){ cb(null); return; }
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      try{
        var size=256, c=document.createElement("canvas"); c.width=size; c.height=size;
        var ctx=c.getContext("2d");
        var s=Math.min(img.width,img.height), sx=(img.width-s)/2, sy=(img.height-s)/2;
        ctx.drawImage(img,sx,sy,s,s,0,0,size,size);
        cb(c.toDataURL("image/jpeg",0.82));
      }catch(err){ cb(null); }
    };
    img.onerror=function(){ cb(null); };
    img.src=e.target.result;
  };
  reader.onerror=function(){ cb(null); };
  reader.readAsDataURL(file);
}
function fileToCover(file, cb){
  if(!file){ cb(null); return; }
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      try{
        var maxW=400, w=Math.min(img.width,maxW), h=Math.round(img.height*(w/img.width));
        var c=document.createElement("canvas"); c.width=w; c.height=h;
        var ctx=c.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        cb(c.toDataURL("image/jpeg",0.8));
      }catch(err){ cb(null); }
    };
    img.onerror=function(){ cb(null); };
    img.src=e.target.result;
  };
  reader.onerror=function(){ cb(null); };
  reader.readAsDataURL(file);
}

function timeAgo(iso){
  if(!iso) return "";
  var en=state.lang==="en";
  var s=Math.floor((Date.now()-new Date(iso).getTime())/1000);
  if(s<60) return en?"just now":"agora há pouco";
  var m=Math.floor(s/60);
  if(m<60) return en?(m+"m ago"):(m+"min atrás");
  var h=Math.floor(m/60);
  if(h<24) return en?(h+"h ago"):(h+"h atrás");
  var d=Math.floor(h/24);
  if(d<7) return en?(d+"d ago"):(d+"d atrás");
  return new Date(iso).toLocaleDateString(en?"en-US":"pt-BR");
}

  try{ await cloudFetchAll(); }catch(e){}
  render();

async function declineCollabInvite(n){

function primaryGenre(item){
  if(!item.genres || !item.genres.length) return null;

function genreCompare(a,b){

  if(!ga) return 1;

function ratingCompare(a,b){

/* Nome mais frequente em item.creators (diretor/autor), preservando a grafia

function topCreatorOf(list){

  list.forEach(function(i){
    (i.creators||[]).forEach(function(c){

    });
  });

    (i.genres||[]).forEach(function(g){

    });
  });

/* Sequência de dias consecutivos com pelo menos um item adicionado, contando
   pra trás a partir de hoje. Se hoje ainda não tem registro, a contagem
   parte de ontem (a sequência só quebra quando um dia inteiro passa em branco). */
function registrationStreak(){
  var days={};
  state.items.forEach(function(i){
    if(!i.createdAt) return;
    var d=new Date(i.createdAt);
    days[d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate()]=true;
  });
  var cursor=new Date();
  var todayKey=cursor.getFullYear()+"-"+cursor.getMonth()+"-"+cursor.getDate();
  if(!days[todayKey]) cursor.setDate(cursor.getDate()-1);
  var streak=0;
  while(days[cursor.getFullYear()+"-"+cursor.getMonth()+"-"+cursor.getDate()]){
    streak++; cursor.setDate(cursor.getDate()-1);
  }
  return streak;
}

function tasteSVG(people, edges){
  var n=people.length, R=150, C=200;
  var pos=people.map(function(p,i){ var ang=-Math.PI/2 + i*(2*Math.PI/n); return { x:C+R*Math.cos(ang), y:C+R*Math.sin(ang) }; });
  var parts=['<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">'];
  edges.forEach(function(e){
    if(e.pct<35) return;
    var pa=pos[e.a], pb=pos[e.b];
    var op=Math.max(0.12, e.pct/100*0.9);
    var w=(1+e.pct/100*3).toFixed(1);
    parts.push('<line x1="'+pa.x.toFixed(1)+'" y1="'+pa.y.toFixed(1)+'" x2="'+pb.x.toFixed(1)+'" y2="'+pb.y.toFixed(1)+'" stroke="var(--lamp)" stroke-opacity="'+op.toFixed(2)+'" stroke-width="'+w+'"/>');
  });
  people.forEach(function(p,i){
    var pp=pos[i]; var r=p.isMe?22:17;
    var initials=initialsOf(p.display_name||p.username||"?");
    parts.push('<g>');
    if(p.avatar_url){
      var cid="tgc"+i;
      parts.push('<clipPath id="'+cid+'"><circle cx="'+pp.x.toFixed(1)+'" cy="'+pp.y.toFixed(1)+'" r="'+r+'"/></clipPath>');
      parts.push('<image href="'+String(p.avatar_url).replace(/"/g,"&quot;")+'" x="'+(pp.x-r).toFixed(1)+'" y="'+(pp.y-r).toFixed(1)+'" width="'+(r*2)+'" height="'+(r*2)+'" clip-path="url(#'+cid+')" preserveAspectRatio="xMidYMid slice"/>');
    } else {
      parts.push('<circle cx="'+pp.x.toFixed(1)+'" cy="'+pp.y.toFixed(1)+'" r="'+r+'" fill="var(--lamp)"/>');
      parts.push('<text x="'+pp.x.toFixed(1)+'" y="'+(pp.y+4).toFixed(1)+'" text-anchor="middle" font-size="13" font-weight="700" fill="var(--tab-dark)">'+initials+'</text>');
    }
    parts.push('<circle cx="'+pp.x.toFixed(1)+'" cy="'+pp.y.toFixed(1)+'" r="'+r+'" fill="none" stroke="'+(p.isMe?"var(--lamp)":"var(--line2)")+'" stroke-width="'+(p.isMe?2.5:1.5)+'"/>');
    parts.push('</g>');
  });
  parts.push('</svg>');
  return parts.join("");
}

      el("button",{ "class":"av-ghost sm", onclick:function(){ setLang(state.lang==="en"?"pt":"en"); } }, state.lang==="en"?"🇺🇸 EN":"🇧🇷 PT"),
      el("button",{ "class":"av-ghost sm", onclick:doLogout }, "Sair"))
  );
}
function Main(){
  var main=el("main",{ "class":"av-main" });
  main.appendChild(MobileAccount());
  if(state.screen==="library") main.appendChild(Library());
  else if(state.screen==="search") main.appendChild(Search());
  else if(state.screen==="work") main.appendChild(WorkPage());
  else if(state.screen==="tastegraph") main.appendChild(TasteGraphScreen());
  else if(state.screen==="playlists") main.appendChild(Playlists());

async function doForgot(email){
  state.authError=""; state.authNotice="";
  if(!email || email.indexOf("@")<0){ state.authError="Digite seu e-mail no campo acima e toque em \"Esqueci minha senha\"."; render(); return; }
  render();
  try{
    await supabase.auth.resetPasswordForEmail(email, { redirectTo: location.origin+location.pathname });
    state.authNotice="Se existir uma conta com esse e-mail, enviamos um link para criar uma senha nova. Confira também o spam.";
  }catch(e){ state.authError="Não foi possível enviar agora. Tente em instantes."; }
  render();
}
async function saveNewPassword(){
  var m=state.pwModal; if(!m || m.busy) return;
  if((m.p1||"").length<6){ m.error="A senha precisa ter pelo menos 6 caracteres."; render(); return; }
  if(m.p1!==m.p2){ m.error="As senhas não coincidem."; render(); return; }
  m.busy=true; m.error=""; render();
  var res=await supabase.auth.updateUser({ password:m.p1 });
  m.busy=false;
  if(res.error){ m.error="Não foi possível salvar: "+res.error.message; }
  else { m.done=true; }
  render();
}
function PasswordModal(){
  var m=state.pwModal;
  var close=function(){ state.pwModal=null; render(); };
  var body=el("div",{ "class":"av-modalbody" });
  if(m.done){
    body.appendChild(el("p",{ "class":"av-fbok" },"Senha alterada! Você já está conectado."));
    return ModalShell("Nova senha", close, body, el("div",{ "class":"av-modalfoot" }, el("button",{ "class":"av-primary", onclick:close },"Fechar")));
  }
  body.appendChild(el("p",{ "class":"av-secsub" },"Escolha a sua nova senha."));
  var mk=function(ph,key,fid){ var i=el("input",{ "class":"av-input", type:"password", placeholder:ph, "data-focus-id":fid, oninput:function(e){ m[key]=e.target.value; } }); i.value=m[key]||""; return i; };
  body.appendChild(el("label",{ "class":"av-label" },"Nova senha"));
  body.appendChild(mk("mínimo 6 caracteres","p1","pw1"));
  body.appendChild(el("label",{ "class":"av-label" },"Repita a senha"));
  body.appendChild(mk("de novo, por garantia","p2","pw2"));
  if(m.error) body.appendChild(el("p",{ "class":"av-metaerr" }, m.error));
  var foot=el("div",{ "class":"av-modalfoot" },
    el("button",{ "class":"av-ghost", onclick:close },"Agora não"),
    el("button",{ "class":"av-primary", disabled:m.busy, onclick:saveNewPassword }, m.busy?"Salvando…":"Salvar senha"));
  return ModalShell("Nova senha", close, body, foot);
}

/* ===== Telas de auth / carregamento / configuração ===== */
function AuthScreen(){
  var isSignup = state.authMode==="signup";
  var card=el("div",{ "class":"av-authcard" });
  card.appendChild(el("div",{ "class":"av-themeseg", role:"group", "aria-label":"Idioma / Language", style:{ alignSelf:"flex-end", marginBottom:"4px" } },
    el("button",{ "class":state.lang!=="en"?"on":"", onclick:function(){ setLang("pt"); } }, "🇧🇷 PT"),
    el("button",{ "class":state.lang==="en"?"on":"", onclick:function(){ setLang("en"); } }, "🇺🇸 EN")
  ));
  card.appendChild(el("div",{ "class":"av-brand", style:{ alignItems:"center", textAlign:"center", gap:"8px" } }, el("img",{ "class":"av-logomark lg", src:LOGO_URI, alt:"Acervo" }), el("span",{ "class":"av-logo" },"Acervo"), el("span",{ "class":"av-tag" },"o que você viu e leu")));
  card.appendChild(el("h2",{ "class":"av-authtitle" }, isSignup?"Criar conta":"Entrar"));
  var f=state.authForm;
  card.appendChild(el("label",{ "class":"av-label" },"E-mail"));
  var email=el("input",{ "class":"av-input", type:"email", autocomplete:"email", placeholder:"seu@email.com", oninput:function(e){ f.email=e.target.value; } }); email.value=f.email; card.appendChild(email);
  card.appendChild(el("label",{ "class":"av-label" },"Senha"));
  var pass=el("input",{ "class":"av-input", type:"password", autocomplete:isSignup?"new-password":"current-password", placeholder:"senha", oninput:function(e){ f.password=e.target.value; } }); pass.value=f.password; card.appendChild(pass);
  var username=null, display=null;
  if(isSignup){
    card.appendChild(el("label",{ "class":"av-label" },"Nome de usuário"));
    username=el("input",{ "class":"av-input", placeholder:"ex: mariana_lima", oninput:function(e){ f.username=e.target.value; } }); username.value=f.username; card.appendChild(username);
    card.appendChild(labelOpt("Nome de exibição"));
    display=el("input",{ "class":"av-input", placeholder:"seu nome", oninput:function(e){ f.display=e.target.value; } }); display.value=f.display; card.appendChild(display);
  }
  if(state.authError) card.appendChild(el("p",{ "class":"av-autherr" }, state.authError));
  var submit=el("button",{ "class":"av-primary av-authbtn", disabled:state.authBusy, onclick:function(){
    if(isSignup) doSignup(f.email.trim(), f.password, (f.username||"").trim(), (f.display||"").trim());
    else doLogin(f.email.trim(), f.password);
  } }, state.authBusy?"Aguarde…":(isSignup?"Criar conta":"Entrar"));
  card.appendChild(submit);
  card.appendChild(el("button",{ "class":"av-authtoggle", onclick:function(){ state.authMode=isSignup?"login":"signup"; state.authError=""; state.authNotice=""; render(); } }, isSignup?"Já tem conta? Entrar":"Não tem conta? Criar uma"));
  if(!isSignup) card.appendChild(el("button",{ "class":"av-authtoggle", onclick:function(){ doForgot(f.email.trim()); } },"Esqueci minha senha"));
  if(state.authNotice) card.appendChild(el("p",{ "class":"av-fbok", style:{ textAlign:"center", fontSize:"13.5px" } }, state.authNotice));
  card.appendChild(el("p",{ "class":"av-version" }, APP_VERSION));
  [email,pass,username,display].forEach(function(inp){ if(inp) inp.addEventListener("keydown", function(ev){ if(ev.key==="Enter") submit.click(); }); });
  return el("div",{ "class":"av-authwrap" }, card);
}
function LoadingScreen(msg){ return el("div",{ "class":"av-loadwrap" }, el("div",{ "class":"av-loading" }, msg||"carregando…")); }
function ConfigNotice(){
  var card=el("div",{ "class":"av-confcard" });
  card.appendChild(el("h2",null,"Falta configurar o Supabase"));
  card.appendChild(el("p",null,"Este arquivo precisa das chaves do seu projeto Supabase para funcionar. Abra o arquivo e, no topo do script, substitua os dois valores:"));
  card.appendChild(el("p",null, el("code",null,"SUPABASE_URL"), " e ", el("code",null,"SUPABASE_ANON_KEY")));
  var ol=el("ol");
  ol.appendChild(el("li",null,"Crie um projeto em supabase.com"));
  ol.appendChild(el("li",null,"No SQL Editor, rode o conteúdo do arquivo supabase-setup.sql"));
  ol.appendChild(el("li",null,"Em Project Settings → API, copie a Project URL e a chave anon public"));
  ol.appendChild(el("li",null,"Cole as duas no topo deste arquivo e publique de novo"));
  card.appendChild(ol);
  return el("div",{ "class":"av-confwrap" }, card);
}

/* ===== Render ===== */
function render(){ renderInner(); try{ applyLang(document.getElementById("root")); }catch(e){} }
function renderInner(){
  if(COMPOSING) return;
  var a=document.activeElement, cap=null;
  if(a && a.getAttribute && a.getAttribute("data-focus-id")) cap={ id:a.getAttribute("data-focus-id"), s:a.selectionStart, e:a.selectionEnd };
  var prevModal=document.querySelector(".av-modal");
  var modalScroll = prevModal ? prevModal.scrollTop : null;
  var root=document.getElementById("root");
  while(root.firstChild) root.removeChild(root.firstChild);
  var inApp = configured && !state.share && state.authResolved && state.user && !state.loadingData;
  root.className=(inApp?"av-root":"av-shell")+" theme-"+state.theme;
  document.body.style.background=PAGE_BG[state.theme];
  var meta=document.querySelector("meta[name=theme-color]"); if(meta) meta.setAttribute("content", PAGE_BG[state.theme]);

  if(!configured){ root.appendChild(ConfigNotice()); return; }
  if(state.share){ root.appendChild(SharePublic()); var smodal=Modals(); if(smodal) root.appendChild(smodal); return; }
  if(!state.authResolved){ root.appendChild(LoadingScreen("conectando…")); return; }
  if(!state.user){ root.appendChild(AuthScreen()); return; }
  if(state.loadingData){ root.appendChild(LoadingScreen("carregando seu acervo…")); return; }

  root.appendChild(Sidebar());
  root.appendChild(Main());
  root.appendChild(Bottom());
  var modal=Modals(); if(modal) root.appendChild(modal);
  if(state._mo && modal){ var first=modal.querySelector("input, textarea"); if(first) first.focus(); state._mo=false; }
  else {
    if(cap){ var n=root.querySelector('[data-focus-id="'+cap.id+'"]'); if(n){ n.focus(); try{ n.setSelectionRange(cap.s,cap.e); }catch(e2){} } }
    if(modalScroll!=null && modal){ var mEl=modal.classList&&modal.classList.contains("av-modal")?modal:modal.querySelector(".av-modal"); if(mEl) mEl.scrollTop=modalScroll; }
  }
}

window.addEventListener("keydown", function(e){
  if(e.key==="Escape"){
    if(state.itemModal){ state.itemModal=null; render(); }
    else if(state.confirmModal){ state.confirmModal=null; render(); }
    else if(state.deleteAccountModal){ state.deleteAccountModal=null; render(); }
    else if(state.pickItemsModal){ state.pickItemsModal=null; render(); }
    else if(state.pickerModal){ state.pickerModal=null; render(); }
    else if(state.plModal){ state.plModal=null; render(); }
    else if(state.addTo){ state.addTo=null; render(); }
    else if(state.profileModal){ state.profileModal=null; render(); }
    else if(state.commentModal){ state.commentModal=null; render(); }
    else if(state.peopleModal){ state.peopleModal=null; render(); }
    else if(state.shareModal){ state.shareModal=null; render(); }
    else if(state.notifModal){ state.notifModal=null; render(); }
    else if(state.onbModal){ finishOnboarding(false); }
  }
});

async function onSignedIn(){
  try{ await ensureProfile(); }catch(e){ console.error("perfil:", e); }
  state.loadingData=true; render();
  try{ await cloudFetchAll(); }catch(e){ console.error("dados:", e && e.message); }
  try{ await loadFollowing(); }catch(e){ console.error("follows:", e && e.message); }
  state.loadingData=false; render();
  checkFeedNews();
  checkNotifNews();
  maybeOnboard();
}
/* Boas-vindas só pra conta nova: biblioteca e coleções vazias E ainda não
   vista neste dispositivo (localStorage, mesmo padrão do sino/feed). Quem já
   tem qualquer registro nunca vê. */
function maybeOnboard(){
  var seen=false; try{ seen = localStorage.getItem("av_onboarded")==="1"; }catch(e){}
  if(seen) return;
  if(state.items.length>0 || state.playlists.length>0) return;
  state.onbModal={ step:0 }; state._mo=true; render();
}
function finishOnboarding(openAdd){
  try{ localStorage.setItem("av_onboarded","1"); }catch(e){}
  state.onbModal=null; render();
  if(openAdd) openNewItem();
}

function init(){
  if("serviceWorker" in navigator){ try{ navigator.serviceWorker.register("sw.js"); }catch(e){} }
  document.addEventListener("compositionstart", function(){ COMPOSING=true; });
  document.addEventListener("compositionend", function(){ COMPOSING=false; render(); });
  if(configured){
    try{
      var params=new URLSearchParams(location.search);
      if(params.get("c")) state.share={ type:"collection", id:params.get("c"), loading:true };
      else if(params.get("i")) state.share={ type:"item", id:params.get("i"), loading:true };
      else if(params.get("u")) state.share={ type:"profile", username:params.get("u"), loading:true, tab:"acervo", commentType:"movie" };
    }catch(e){}
  }
  render();
  if(!configured) return;
  if(state.share){ loadShare(); }
  try{
    var h=location.hash||"";
    if(h.indexOf("type=recovery")>=0){ state.pwModal={ p1:"", p2:"", busy:false, done:false, error:"" }; }
    if(h.indexOf("error_code=otp_expired")>=0 || h.indexOf("error=access_denied")>=0){
      state.authNotice="Esse link de senha expirou ou já foi usado. Peça um novo em \"Esqueci minha senha\".";
      history.replaceState(null,"",location.pathname+location.search);
    }
  }catch(e){}
  supabase.auth.onAuthStateChange(function(event, session){
    state.authResolved=true;
    if(event==="PASSWORD_RECOVERY"){ state.pwModal={ p1:"", p2:"", busy:false, done:false, error:"" }; }
    if(session && session.user){ state.user=session.user; onSignedIn(); }
    else {
      /* No login bem-sucedido, doLogin/doSignup deixam authBusy=true e não
         resetam (o onAuthStateChange assume dali). Ao deslogar sem refresh,
         esse true persistia e o botão "Entrar" da tela de login ficava
         desabilitado pra sempre. Zera aqui ao voltar pra deslogado. */
      state.user=null; state.profile=null; state.items=[]; state.playlists=[]; state.links=[]; state.memberPlaylists=[];
      state.authBusy=false; state.authForm={ email:"", password:"", username:"", display:"" };
      render();
    }
  });
  setTimeout(function(){ if(!state.authResolved){ state.authResolved=true; render(); } }, 5000);
}
init();
</script>
