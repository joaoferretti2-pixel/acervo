<style>
*{box-sizing:border-box}
html,body,#root{height:100%}
body{margin:0;background:#F2EEE3}
.theme-dark{
  --ink:#13172A; --raised:#1B2140; --line:#2A3157; --line2:#363f6b;
  --parch:#ECE5D6; --muted:#8E93AD; --lamp:#E7B264; --lamp-hi:#ffe9c0; --lampglow:rgba(231,178,100,.55);
  --film:#E7B264; --book:#9FB0C9; --rose:#C77B6F;
  --accent-soft:rgba(231,178,100,.08); --accent-line:rgba(231,178,100,.38); --focus:rgba(231,178,100,.14);
  --book-soft:rgba(159,176,201,.08); --book-line:rgba(159,176,201,.35); --rose-line:rgba(199,123,111,.5);
  --glow:rgba(231,178,100,.07); --shadow-card:0 10px 28px -16px rgba(0,0,0,.7);
  --shadow-modal:0 30px 80px -20px rgba(0,0,0,.8); --backdrop-bg:rgba(8,10,18,.66); --tab-dark:#1a1406;
}
.theme-light{
  --ink:#F2EEE3; --raised:#FBF8F1; --line:#E6DECC; --line2:#D8CDB6;
  --parch:#2D3142; --muted:#867E6B; --lamp:#C5882F; --lamp-hi:#EFC36F; --lampglow:rgba(197,138,54,.26);
  --film:#D49A45; --book:#6E8198; --rose:#B25A4D;
  --accent-soft:rgba(197,138,54,.12); --accent-line:rgba(197,138,54,.42); --focus:rgba(197,138,54,.22);
  --book-soft:rgba(110,129,152,.12); --book-line:rgba(110,129,152,.40); --rose-line:rgba(178,90,77,.45);
  --glow:rgba(212,154,69,.10); --shadow-card:0 12px 30px -18px rgba(60,50,30,.20);
  --shadow-modal:0 28px 70px -24px rgba(60,50,30,.26); --backdrop-bg:rgba(45,40,30,.34); --tab-dark:#241a05;
}
.av-shell{min-height:100vh;background:radial-gradient(1100px 480px at 50% -220px, var(--glow), transparent 62%), var(--ink);color:var(--parch);font-family:'Hanken Grotesk',system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
.av-root{min-height:100vh; display:grid; grid-template-columns:240px 1fr;
  background:radial-gradient(1100px 480px at 50% -220px, var(--glow), transparent 62%), var(--ink);
  color:var(--parch); font-family:'Hanken Grotesk',system-ui,sans-serif; font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased; transition:background .3s,color .3s}
.av-side{border-right:1px solid var(--line); padding:30px 22px; display:flex; flex-direction:column; gap:30px; position:sticky; top:0; height:100vh}
.av-brand{display:flex;flex-direction:column;gap:4px}
.av-brandrow{display:flex;align-items:center;gap:11px}
.av-logomark{width:38px;height:38px;flex:none}
.av-logomark.lg{width:52px;height:52px}
.av-recseed{font-size:11.5px;color:var(--muted);letter-spacing:.02em}
.av-sugwhy{font-size:11.5px;color:var(--lamp)}
.av-dischead{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:26px 0 14px}
.av-dischead h3{margin:0;font-family:'Fraunces',serif;font-weight:600;font-size:21px}
.av-logo{font-family:'Fraunces',serif;font-weight:600;font-size:27px;letter-spacing:.01em;color:var(--parch)}
.av-tag{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.av-nav{display:flex;flex-direction:column;gap:2px}
.av-navitem{text-align:left;background:none;border:none;cursor:pointer;color:var(--muted);font:inherit;font-weight:600;font-size:15px;padding:9px 12px;border-radius:7px;border-left:2px solid transparent;transition:color .15s,background .15s}
.av-navitem:hover{color:var(--parch)}
.av-navitem.active{color:var(--parch);background:var(--accent-soft);border-left-color:var(--lamp)}
.av-sidefoot{margin-top:auto;display:flex;flex-direction:column;gap:10px;font-size:12px;color:var(--muted);letter-spacing:.02em}
.av-sidesub{font-size:11px;color:var(--muted)}
.av-sideuser{font-weight:600;color:var(--parch)}
.av-acctblock{display:flex;flex-direction:column;gap:2px}
.av-sidehandle{font-size:12px;color:var(--muted)}
.av-editlink{align-self:flex-start;background:none;border:none;padding:2px 0 0;margin:0;color:var(--lamp);cursor:pointer;font:inherit;font-size:12px;text-decoration:underline;text-underline-offset:3px}

.av-confcard{max-width:540px;background:var(--raised);border:1px solid var(--line);border-radius:14px;padding:26px 28px;line-height:1.65;color:var(--muted)}
.av-confcard h2{font-family:'Fraunces',serif;margin:0 0 12px;color:var(--parch)}
.av-confcard code{background:var(--ink);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:13px;color:var(--parch)}
.av-confcard ol{margin:8px 0 0;padding-left:20px}
.av-confcard li{margin:6px 0}
.av-mobacct{display:none}
@media (max-width:760px){
  .av-root{grid-template-columns:1fr}
  .av-side{display:none}
  .av-main{padding:24px 20px 96px}
  .av-h1{font-size:32px}
  .av-grid{grid-template-columns:1fr}
  .av-mobacct{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;font-size:13px;color:var(--muted)}
  .av-bottom{display:flex;position:fixed;left:0;right:0;bottom:0;background:var(--ink);border-top:1px solid var(--line);z-index:40;padding-bottom:env(safe-area-inset-bottom)}
  .av-bottom button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font:inherit;font-weight:600;font-size:10.5px;padding:9px 0 11px;cursor:pointer}
  .av-bottom button.on{color:var(--lamp)}
  .av-bottom svg{width:21px;height:21px;display:block}
  .av-screenhead{flex-direction:column;align-items:flex-start}
  .av-statgrid{grid-template-columns:repeat(2,1fr)}
  .av-statnum{font-size:30px}
  .av-barrow{grid-template-columns:96px 1fr auto;gap:10px}
}
@media (prefers-reduced-motion: reduce){ *{transition:none!important;animation:none!important} .av-card:hover{transform:none} }
</style>

/* ===== Camada de dados (Supabase) ===== */
function cw(promise){ Promise.resolve(promise).then(function(res){ if(res && res.error) console.error("Supabase:", res.error.message); }).catch(function(e){ console.error("Supabase:", e); }); }
function rowToItem(r){ return { id:r.id, type:r.type, status:r.status, title:r.title, subtitle:r.subtitle, cover:r.cover, rating:r.rating, notes:r.notes, synopsis:r.synopsis, createdAt:r.created_at }; }
function rowToColl(r){ return { id:r.id, name:r.name, tag:r.tag, description:r.description, isPublic:r.is_public, createdAt:r.created_at }; }
function rowToLink(r){ return { id:r.id, playlistId:r.collection_id, itemId:r.item_id, itemType:r.item_type }; }
function rowToShare(r){ return { id:r.id, user_id:r.user_id, kind:r.kind, ref_id:r.ref_id, title:r.title, subtitle:r.subtitle, cover:r.cover, note:r.note, createdAt:r.created_at }; }
function rowToComment(r){ return { id:r.id, user_id:r.user_id, item_type:r.item_type, title:r.title, body:r.body, createdAt:r.created_at }; }

async function cloudFetchAll(){
  var uid = state.user.id;
  var res = await Promise.all([
    supabase.from("items").select("*").eq("user_id", uid),
    supabase.from("collections").select("*").eq("user_id", uid),
    supabase.from("collection_items").select("*").eq("user_id", uid)
  ]);
  for(var i=0;i<res.length;i++){ if(res[i].error) throw res[i].error; }
  state.items = (res[0].data||[]).map(rowToItem);
  state.playlists = (res[1].data||[]).map(rowToColl);
  state.links = (res[2].data||[]).map(rowToLink);
}

async function ensureProfile(){
  var uid = state.user.id;
  var got = await supabase.from("profiles").select("*").eq("id", uid).maybeSingle();
  if(got.data){ state.profile = got.data; return; }
  var base = (pendingUsername || (state.user.email||"").split("@")[0] || "user").toLowerCase().replace(/[^a-z0-9_]/g,"").slice(0,20);
  if(!base) base = "user" + Math.floor(Math.random()*9999);
  var display = pendingDisplay || base;
  var ins = await supabase.from("profiles").insert({ id: uid, username: base, display_name: display }).select().single();
  if(ins.error){
    var taken = (ins.error.code==="23505") || ((ins.error.message||"").toLowerCase().indexOf("duplicate")>=0);
    if(taken){
      base = base + Math.floor(Math.random()*9999);
      var retry = await supabase.from("profiles").insert({ id: uid, username: base, display_name: display }).select().single();
      state.profile = retry.data || { id:uid, username:base, display_name:display };
    } else {
      state.profile = { id:uid, username:base, display_name:display };
    }
  } else {
    state.profile = ins.data;
  }
  pendingUsername = null; pendingDisplay = null;
}

/* ===== Ações ===== */
function go(screen){ state.screen=screen; if(screen!=="playlist") state.openPl=null; render(); }
function setTheme(t){ state.theme=t; saveTheme(t); render(); }

function openNewItem(){ state.itemModal={mode:"new", draft:{type:state.tab, status:state.statusView, title:"", subtitle:"", cover:"", rating:0, notes:"", synopsis:""}}; state._mo=true; render(); }
function openEditItem(it){ state.itemModal={mode:"edit", draft:Object.assign({},it)}; state._mo=true; render(); }
function closeItem(){ state.itemModal=null; render(); }
function updateDraft(f,v){
  state.itemModal.draft[f]=v;
  if(f==="title"||f==="type"){
    clearTimeout(META_TIMER);
    if(f==="type") state.itemModal.search=null;
    if(state.itemModal.draft.title.trim().length>=3){ META_TIMER=setTimeout(function(){ if(state.itemModal) runMetaSearch(); }, 650); }
    else state.itemModal.search=null;
  }
  render();
}
function saveItem(){
  var dr=state.itemModal.draft; if(!dr.title.trim()) return;
  var clean={ title:dr.title.trim(), subtitle:dr.subtitle||"", cover:(dr.cover||"").trim(), type:dr.type, status:dr.status, rating: dr.status==="done"?dr.rating:0, notes:dr.notes||"", synopsis:dr.synopsis||"" };
  if(state.itemModal.mode==="new"){
    var id=newId();
    state.items.unshift(Object.assign({id:id, createdAt:new Date().toISOString()}, clean));
    cw(supabase.from("items").insert({ id:id, user_id:state.user.id, type:clean.type, status:clean.status, title:clean.title, subtitle:clean.subtitle, cover:clean.cover, rating:clean.rating, notes:clean.notes, synopsis:clean.synopsis }));
  } else {
    var pid=dr.id;
    state.items=state.items.map(function(x){ return x.id===pid?Object.assign({},x,clean):x; });
    cw(supabase.from("items").update({ type:clean.type, status:clean.status, title:clean.title, subtitle:clean.subtitle, cover:clean.cover, rating:clean.rating, notes:clean.notes, synopsis:clean.synopsis }).eq("id",pid));
  }
  state.itemModal=null; render();
}
function deleteItem(it){
  state.items=state.items.filter(function(x){return x.id!==it.id;});
  state.links=state.links.filter(function(l){return l.itemId!==it.id;});
  cw(supabase.from("items").delete().eq("id",it.id));
  render();
}
function moveStatus(it,status,openModal){
  var up=Object.assign({},it,{status:status});
  state.items=state.items.map(function(x){return x.id===it.id?up:x;});
  cw(supabase.from("items").update({status:status}).eq("id",it.id));
  if(openModal){ state.itemModal={mode:"edit",draft:up}; state._mo=true; }
  render();
}
function openNewPl(){ state.plModal={draft:{name:"",tag:"",description:""}}; state._mo=true; render(); }
function updatePlDraft(f,v){ state.plModal.draft[f]=v; render(); }
function savePl(){
  var dr=state.plModal.draft; if(!dr.name.trim()) return;
  var id=newId();
  state.playlists.unshift({id:id, name:dr.name.trim(), tag:dr.tag.trim(), description:dr.description.trim(), isPublic:false, createdAt:new Date().toISOString()});
  cw(supabase.from("collections").insert({ id:id, user_id:state.user.id, name:dr.name.trim(), tag:dr.tag.trim(), description:dr.description.trim(), is_public:false }));
  state.plModal=null; render();
}
function deletePl(pl){
  state.playlists=state.playlists.filter(function(p){return p.id!==pl.id;});
  state.links=state.links.filter(function(l){return l.playlistId!==pl.id;});
  cw(supabase.from("collections").delete().eq("id",pl.id));
  if(state.openPl===pl.id){ state.openPl=null; state.screen="playlists"; }
  render();
}
function hasLink(plId,itemId){ return state.links.some(function(l){return l.playlistId===plId&&l.itemId===itemId;}); }
function toggleLink(plId,item){
  if(hasLink(plId,item.id)){
    state.links=state.links.filter(function(l){return !(l.playlistId===plId&&l.itemId===item.id);});
    cw(supabase.from("collection_items").delete().eq("collection_id",plId).eq("item_id",item.id));
  } else {
    var id=newId();
    state.links.push({id:id, playlistId:plId, itemId:item.id, itemType:item.type});
    cw(supabase.from("collection_items").insert({ id:id, user_id:state.user.id, collection_id:plId, item_id:item.id, item_type:item.type }));
  }
}
function removeFromPl(plId,item){
  state.links=state.links.filter(function(l){return !(l.playlistId===plId&&l.itemId===item.id);});
  cw(supabase.from("collection_items").delete().eq("collection_id",plId).eq("item_id",item.id));
  render();
}

/* ===== Preenchimento automático (capa, autor/direção, ano) ===== */
function stripHtml(s){ return String(s).replace(/<br\s*\/?>/gi,"\n").replace(/<[^>]+>/g,"").replace(/&amp;/g,"&").replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/&nbsp;/g," ").trim(); }
var META_TIMER=null;
async function metaSearch(type, q){
  q=(q||"").trim(); if(!q) return [];
  if(type==="book"){
    var enc=encodeURIComponent;
    var urls=[
      "https://www.googleapis.com/books/v1/volumes?q="+enc(q)+"&langRestrict=pt&printType=books&maxResults=10",
      "https://www.googleapis.com/books/v1/volumes?q="+enc(q)+"&printType=books&maxResults=10",
      "https://openlibrary.org/search.json?q="+enc(q)+"&limit=10&fields=title,author_name,first_publish_year,cover_i,key"
    ];
    var rs=await Promise.all(urls.map(function(u){ return fetch(u).then(function(r){ return r.json(); }).catch(function(){ return null; }); }));
    var mapG=function(v){
      var vi=v.volumeInfo||{};
      var img=(vi.imageLinks && (vi.imageLinks.thumbnail||vi.imageLinks.smallThumbnail))||"";
      return { gbId:v.id, lang:vi.language||"", title:vi.title||"", name:(vi.authors&&vi.authors.join(", "))||"", year:(vi.publishedDate||"").slice(0,4), cover: img.replace(/^http:/,"https:"), synopsis: stripHtml(vi.description||"") };
    };
    var out=[], seen={};
    var push=function(r){
      if(!r.title) return;
      var k=normTitle(r.title)+"|"+normTitle(r.name);
      if(seen[k]) return; seen[k]=1; out.push(r);
    };
    var g1=(((rs[0]||{}).items)||[]).map(mapG);
    var g2=(((rs[1]||{}).items)||[]).map(mapG);
    g1.forEach(push);
    g2.filter(function(r){ return r.lang==="pt"; }).forEach(push);
    g2.forEach(push);
    ((((rs[2]||{}).docs))||[]).forEach(function(b){

function normTitle(s){ return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g," ").trim(); }
async function tmdbRecsFor(title){
  if(!TMDB_KEY) return [];
  var s=await fetch("https://api.themoviedb.org/3/search/movie?api_key="+TMDB_KEY+"&language=pt-BR&include_adult=false&query="+encodeURIComponent(title));
  var sd=await s.json(); var m=(sd.results||[])[0]; if(!m) return [];
  var r=await fetch("https://api.themoviedb.org/3/movie/"+m.id+"/recommendations?api_key="+TMDB_KEY+"&language=pt-BR");
  var rd=await r.json(); return rd.results||[];
}
async function loadDiscover(force){
  var dv=state.recs;
  if(dv.loading || (dv.loaded && !force)) return;
  dv.loading=true; dv.error=""; render();
  try{
    var owned={}; state.items.forEach(function(i){ owned[normTitle(i.title)]=1; });
    var byRating=function(a,b){ return (b.rating||0)-(a.rating||0); };
    var seedM=state.items.filter(function(i){ return i.type==="movie" && i.status==="done"; }).sort(byRating).slice(0,3);
    var seedB=state.items.filter(function(i){ return i.type==="book" && i.status==="done"; }).sort(byRating).slice(0,4);
    var films=[], seenF={};
    for(var i=0;i<seedM.length;i++){
      var recs=await tmdbRecsFor(seedM[i].title);
      recs.slice(0,10).forEach(function(m){
        if(seenF[m.id] || owned[normTitle(m.title)]) return;
        seenF[m.id]=1;
        films.push({ title:m.title, sub:(m.release_date||"").slice(0,4), cover:m.poster_path?("https://image.tmdb.org/t/p/w342"+m.poster_path):"", synopsis:m.overview||"", seed:seedM[i].title, pop:m.popularity||0 });
      });
    }
    films.sort(function(a,b){ return b.pop-a.pop; });
    dv.films=films.slice(0,12);
    var authors=[];
    seedB.forEach(function(b){ var a=(b.subtitle||"").split(",")[0].trim(); if(a && authors.indexOf(a)<0) authors.push(a); });
    authors=authors.slice(0,3);
    var books=[], seenB={};
    for(var j=0;j<authors.length;j++){
      try{
        var br=await fetch("https://www.googleapis.com/books/v1/volumes?q="+encodeURIComponent('inauthor:"'+authors[j]+'"')+"&langRestrict=pt&printType=books&orderBy=relevance&maxResults=10");
        var bd=await br.json();
        ((bd&&bd.items)||[]).forEach(function(v){
          var vi=v.volumeInfo||{}; var nt=normTitle(vi.title);
          if(!vi.title || seenB[nt] || owned[nt]) return;
          seenB[nt]=1;
          var img=(vi.imageLinks && (vi.imageLinks.thumbnail||vi.imageLinks.smallThumbnail))||"";
          books.push({ title:vi.title, sub:[(vi.authors&&vi.authors[0])||authors[j], (vi.publishedDate||"").slice(0,4)].filter(Boolean).join(", "), cover:img.replace(/^http:/,"https:"), synopsis:stripHtml(vi.description||""), seed:authors[j] });
        });
      }catch(eb){}
    }
    dv.books=books.slice(0,12);
    dv.loaded=true;
  }catch(e){ dv.error="Não foi possível gerar sugestões agora. Tente de novo em instantes."; }
  dv.loading=false; render();
}

async function loadSuggestions(force){

  sg.loading=true; render();
  try{
    var me=state.user.id;
    var mine={}; state.following.forEach(function(id){ mine[id]=1; });
    var score={}, why={};
    /* quem me segue e eu não sigo de volta */
    var fr=await supabase.from("follows").select("follower_id").eq("following_id", me).limit(200);
    (fr.data||[]).forEach(function(r){

    });

      var counts={};

      });
      Object.keys(counts).forEach(function(id){
        if(score[id]){ score[id]+=counts[id]; }
        else{
          score[id]=counts[id];
          why[id]="seguido por "+counts[id]+(counts[id]===1?" pessoa que você segue":" pessoas que você segue");
        }
      });
    }
    var ids=Object.keys(score).sort(function(a,b){ return score[b]-score[a]; }).slice(0,6);

  }catch(e){ sg.people=[]; sg.loaded=true; }

/* ===== Avatar (foto da galeria ou gerado) ===== */
function genIdenticon(seed){
  try{
    var h=0; for(var i=0;i<seed.length;i++) h=(h*31+seed.charCodeAt(i))>>>0;
    var hue=h%360, size=160, cells=5, cell=size/cells;
    var c=document.createElement("canvas"); c.width=size; c.height=size;
    var ctx=c.getContext("2d"); if(!ctx) return null;
    ctx.fillStyle="hsl("+hue+",28%,20%)"; ctx.fillRect(0,0,size,size);
    ctx.fillStyle="hsl("+hue+",58%,62%)";
    var rnd=h||1;
    function bit(){ rnd=(rnd*1103515245+12345)&0x7fffffff; return (rnd>>17)&1; }
    for(var x=0;x<3;x++) for(var y=0;y<cells;y++){ if(bit()){ ctx.fillRect(x*cell,y*cell,cell,cell); ctx.fillRect((cells-1-x)*cell,y*cell,cell,cell); } }
    return c.toDataURL("image/png");
  }catch(e){ return null; }
}
function fileToAvatar(file, cb){
  if(!file){ cb(null); return; }
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      try{
        var size=256, c=document.createElement("canvas"); c.width=size; c.height=size;
        var ctx=c.getContext("2d");
        var s=Math.min(img.width,img.height), sx=(img.width-s)/2, sy=(img.height-s)/2;
        ctx.drawImage(img,sx,sy,s,s,0,0,size,size);
        cb(c.toDataURL("image/jpeg",0.82));
      }catch(err){ cb(null); }
    };
    img.onerror=function(){ cb(null); };
    img.src=e.target.result;
  };
  reader.onerror=function(){ cb(null); };
  reader.readAsDataURL(file);
}

async function doLogin(email,password){

function traduzErro(m){
  m = m || "Erro";
  if(/invalid login credentials/i.test(m)) return "E-mail ou senha incorretos.";
  if(/already registered|already been registered/i.test(m)) return "Este e-mail já tem conta. Faça login.";
  if(/password should be at least/i.test(m)) return "A senha precisa ter pelo menos 6 caracteres.";
  if(/unable to validate email|invalid email/i.test(m)) return "E-mail inválido.";
  return m;

      el("button",{ "class":"av-ghost sm", onclick:function(){ openShare("profile", p.username, "Perfil de @"+p.username); } }, "↗ Compartilhar")
    )
  ));
  sec.appendChild(el("div",{ "class":"av-statusview" },
    el("button",{ "class":vu.tab==="acervo"?"on":"", onclick:function(){ vu.tab="acervo"; render(); } }, "Acervo"),
    el("button",{ "class":vu.tab==="comentarios"?"on":"", onclick:function(){ vu.tab="comentarios"; render(); } }, "Comentários")
  ));

  if(vu.tab==="acervo"){
    var done=vu.items.filter(function(i){ return statusOf(i)==="done"; }).sort(function(a,b){ return (b.createdAt||"").localeCompare(a.createdAt||""); });
    if(done.length===0){
      sec.appendChild(el("div",{ "class":"av-empty" }, el("p",null,"Nada no acervo ainda.")));
    } else {
      var grid=el("div",{ "class":"av-grid" });
      done.forEach(function(it){ grid.appendChild(ItemCard(it,"view")); });
      sec.appendChild(grid);
    }
    if(vu.playlists.length>0){
      sec.appendChild(el("h2",{ "class":"av-h2" }, "Coleções"));
      var cg=el("div",{ "class":"av-grid" });
      vu.playlists.forEach(function(pl){
        var list=vu.links.filter(function(l){return l.playlistId===pl.id;}).map(function(l){return vu.items.find(function(i){return i.id===l.itemId;});}).filter(Boolean);
        var body=el("div",{ "class":"av-cardbody" });
        body.appendChild(el("div",{ "class":"av-plhead" }, el("h4",{ "class":"av-title" }, pl.name), Chip(pl.tag)));
        if(pl.description) body.appendChild(el("p",{ "class":"av-notes" }, pl.description));
        body.appendChild(el("div",{ "class":"av-plmeta" }, el("span",null, list.length+" "+(list.length===1?"item":"itens"))));
        cg.appendChild(el("article",{ "class":"av-card" }, body));
      });
      sec.appendChild(cg);
    }
  } else {
    // comentários, separados por filme/livro
    var bar=el("div",{ "class":"av-commentbar" });
    bar.appendChild(el("div",{ "class":"av-seg av-commentseg" },
      seg("Filmes", vu.commentType==="movie", function(){ vu.commentType="movie"; render(); }),
      seg("Livros", vu.commentType==="book", function(){ vu.commentType="book"; render(); })
    ));
    if(own) bar.appendChild(el("button",{ "class":"av-primary", onclick:openCommentModal }, "+ Comentar"));
    sec.appendChild(bar);
    var list=vu.comments.filter(function(c){ return c.item_type===vu.commentType; });
    if(list.length===0){
      sec.appendChild(el("div",{ "class":"av-empty" }, el("p",null, own ? "Você ainda não comentou nenhum "+(vu.commentType==="movie"?"filme":"livro")+"." : "Nenhum comentário de "+(vu.commentType==="movie"?"filmes":"livros")+" ainda.")));
    } else {
      var clist=el("div",{ "class":"av-commentlist" });
      list.forEach(function(c){ clist.appendChild(CommentCard(c, own)); });
      sec.appendChild(clist);
    }
  }
  return sec;
}
function RecCard(rec, type){
  var body=el("div",{ "class":"av-cardbody" });
  body.appendChild(el("h4",{ "class":"av-title" }, rec.title));
  if(rec.sub) body.appendChild(el("p",{ "class":"av-notes" }, rec.sub));
  if(rec.synopsis) body.appendChild(el("p",{ "class":"av-synopsis" }, rec.synopsis.length>180 ? rec.synopsis.slice(0,180).trim()+"…" : rec.synopsis));
  body.appendChild(el("span",{ "class":"av-recseed" }, "porque você "+(type==="movie"?"viu":"leu")+" “"+rec.seed+"”"));
  var foot=el("div",{ "class":"av-cardfoot" });
  if(rec.added) foot.appendChild(el("button",{ "class":"av-ghost sm", disabled:true }, "✓ Na lista de desejos"));
  else foot.appendChild(el("button",{ "class":"av-markbtn", onclick:function(){ recAdd(rec, type); } }, type==="movie"?"+ Quero ver":"+ Quero ler"));
  body.appendChild(foot);
  return el("article",{ "class":"av-card" }, Cover({ cover:rec.cover, type:type, title:rec.title }), body);
}
function Discover(){
  var dv=state.recs;
  var sec=el("section");
  var head=el("div",null, el("h1",{ "class":"av-h1" },"Descobrir"), el("p",{ "class":"av-sub" },"sugestões a partir do que você viu e leu"));
  sec.appendChild(el("div",{ "class":"av-screenhead" }, head,
    el("button",{ "class":"av-ghost", disabled:dv.loading, onclick:function(){ loadDiscover(true); } }, dv.loading?"gerando…":"↻ Atualizar")));
  var seeds=state.items.filter(function(i){ return i.status==="done"; });
  if(seeds.length===0){
    sec.appendChild(el("p",{ "class":"av-wishline" },"Adicione alguns filmes e livros concluídos à sua biblioteca — as sugestões nascem deles."));
    return sec;
  }
  if(!dv.loaded && !dv.loading){ setTimeout(function(){ loadDiscover(); }, 0); }
  if(dv.loading && !dv.loaded){ sec.appendChild(el("p",{ "class":"av-wishline" },"gerando sugestões…")); return sec; }
  if(dv.error) sec.appendChild(el("p",{ "class":"av-metaerr" }, dv.error));
  if(dv.films.length){
    sec.appendChild(el("div",{ "class":"av-dischead" }, el("h3",null,"Filmes para você")));
    var gf=el("div",{ "class":"av-grid" });
    dv.films.forEach(function(r){ gf.appendChild(RecCard(r,"movie")); });
    sec.appendChild(gf);
  }
  if(dv.books.length){
    sec.appendChild(el("div",{ "class":"av-dischead" }, el("h3",null,"Livros para você")));
    var gb=el("div",{ "class":"av-grid" });
    dv.books.forEach(function(r){ gb.appendChild(RecCard(r,"book")); });
    sec.appendChild(gb);
  }
  if(dv.loaded && !dv.films.length && !dv.books.length && !dv.error){
    sec.appendChild(el("p",{ "class":"av-wishline" },"Ainda não encontrei sugestões novas — avalie mais itens concluídos e tente atualizar."));
  }
  return sec;
}

  s.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+d+"</svg>";
  return s;
}

  return el("div",{ "class":"av-mobacct" },

  else if(state.screen==="playlist") main.appendChild(PlaylistDetail());

/* ===== Telas de auth / carregamento / configuração ===== */
function AuthScreen(){
  var isSignup = state.authMode==="signup";
  var card=el("div",{ "class":"av-authcard" });
  card.appendChild(el("div",{ "class":"av-brand", style:{ alignItems:"center", textAlign:"center", gap:"8px" } }, el("img",{ "class":"av-logomark lg", src:LOGO_URI, alt:"Acervo" }), el("span",{ "class":"av-logo" },"Acervo"), el("span",{ "class":"av-tag" },"o que você viu e leu")));
  card.appendChild(el("h2",{ "class":"av-authtitle" }, isSignup?"Criar conta":"Entrar"));
  var f=state.authForm;
  card.appendChild(el("label",{ "class":"av-label" },"E-mail"));
  var email=el("input",{ "class":"av-input", type:"email", autocomplete:"email", placeholder:"seu@email.com", oninput:function(e){ f.email=e.target.value; } }); email.value=f.email; card.appendChild(email);
  card.appendChild(el("label",{ "class":"av-label" },"Senha"));
  var pass=el("input",{ "class":"av-input", type:"password", autocomplete:isSignup?"new-password":"current-password", placeholder:"senha", oninput:function(e){ f.password=e.target.value; } }); pass.value=f.password; card.appendChild(pass);
  var username=null, display=null;
  if(isSignup){
    card.appendChild(el("label",{ "class":"av-label" },"Nome de usuário"));
    username=el("input",{ "class":"av-input", placeholder:"ex: joaoferretti", oninput:function(e){ f.username=e.target.value; } }); username.value=f.username; card.appendChild(username);
    card.appendChild(labelOpt("Nome de exibição"));
    display=el("input",{ "class":"av-input", placeholder:"seu nome", oninput:function(e){ f.display=e.target.value; } }); display.value=f.display; card.appendChild(display);
  }
  if(state.authError) card.appendChild(el("p",{ "class":"av-autherr" }, state.authError));
  var submit=el("button",{ "class":"av-primary av-authbtn", disabled:state.authBusy, onclick:function(){
    if(isSignup) doSignup(f.email.trim(), f.password, (f.username||"").trim(), (f.display||"").trim());
    else doLogin(f.email.trim(), f.password);
  } }, state.authBusy?"Aguarde…":(isSignup?"Criar conta":"Entrar"));
  card.appendChild(submit);
  card.appendChild(el("button",{ "class":"av-authtoggle", onclick:function(){ state.authMode=isSignup?"login":"signup"; state.authError=""; render(); } }, isSignup?"Já tem conta? Entrar":"Não tem conta? Criar uma"));
  [email,pass,username,display].forEach(function(inp){ if(inp) inp.addEventListener("keydown", function(ev){ if(ev.key==="Enter") submit.click(); }); });
  return el("div",{ "class":"av-authwrap" }, card);
}
function LoadingScreen(msg){ return el("div",{ "class":"av-loadwrap" }, el("div",{ "class":"av-loading" }, msg||"carregando…")); }
function ConfigNotice(){
  var card=el("div",{ "class":"av-confcard" });
  card.appendChild(el("h2",null,"Falta configurar o Supabase"));
  card.appendChild(el("p",null,"Este arquivo precisa das chaves do seu projeto Supabase para funcionar. Abra o arquivo e, no topo do script, substitua os dois valores:"));
  card.appendChild(el("p",null, el("code",null,"SUPABASE_URL"), " e ", el("code",null,"SUPABASE_ANON_KEY")));
  var ol=el("ol");
  ol.appendChild(el("li",null,"Crie um projeto em supabase.com"));
  ol.appendChild(el("li",null,"No SQL Editor, rode o conteúdo do arquivo supabase-setup.sql"));
  ol.appendChild(el("li",null,"Em Project Settings → API, copie a Project URL e a chave anon public"));
  ol.appendChild(el("li",null,"Cole as duas no topo deste arquivo e publique de novo"));
  card.appendChild(ol);
  return el("div",{ "class":"av-confwrap" }, card);

/* ===== Render ===== */
function render(){
  if(COMPOSING) return;
  var a=document.activeElement, cap=null;
  if(a && a.getAttribute && a.getAttribute("data-focus-id")) cap={ id:a.getAttribute("data-focus-id"), s:a.selectionStart, e:a.selectionEnd };
  var root=document.getElementById("root");
  while(root.firstChild) root.removeChild(root.firstChild);
  var inApp = configured && !state.share && state.authResolved && state.user && !state.loadingData;
  root.className=(inApp?"av-root":"av-shell")+" theme-"+state.theme;
  document.body.style.background=PAGE_BG[state.theme];
  var meta=document.querySelector("meta[name=theme-color]"); if(meta) meta.setAttribute("content", PAGE_BG[state.theme]);

  if(!configured){ root.appendChild(ConfigNotice()); return; }
  if(state.share){ root.appendChild(SharePublic()); var smodal=Modals(); if(smodal) root.appendChild(smodal); return; }
  if(!state.authResolved){ root.appendChild(LoadingScreen("conectando…")); return; }
  if(!state.user){ root.appendChild(AuthScreen()); return; }
  if(state.loadingData){ root.appendChild(LoadingScreen("carregando seu acervo…")); return; }

  root.appendChild(Sidebar());
  root.appendChild(Main());
  root.appendChild(Bottom());
  var modal=Modals(); if(modal) root.appendChild(modal);
  if(state._mo && modal){ var first=modal.querySelector("input, textarea"); if(first) first.focus(); state._mo=false; }
  else if(cap){ var n=root.querySelector('[data-focus-id="'+cap.id+'"]'); if(n){ n.focus(); try{ n.setSelectionRange(cap.s,cap.e); }catch(e2){} } }
}

window.addEventListener("keydown", function(e){
  if(e.key==="Escape"){
    if(state.itemModal){ state.itemModal=null; render(); }
    else if(state.plModal){ state.plModal=null; render(); }
    else if(state.addTo){ state.addTo=null; render(); }
    else if(state.profileModal){ state.profileModal=null; render(); }
    else if(state.commentModal){ state.commentModal=null; render(); }
    else if(state.peopleModal){ state.peopleModal=null; render(); }
    else if(state.shareModal){ state.shareModal=null; render(); }
  }
});

async function onSignedIn(){
  try{ await ensureProfile(); }catch(e){ console.error("perfil:", e); }
  state.loadingData=true; render();
  try{ await cloudFetchAll(); }catch(e){ console.error("dados:", e && e.message); }
  try{ await loadFollowing(); }catch(e){ console.error("follows:", e && e.message); }
  state.loadingData=false; render();
}

function init(){
  document.addEventListener("compositionstart", function(){ COMPOSING=true; });
  document.addEventListener("compositionend", function(){ COMPOSING=false; render(); });
  if(configured){
    try{
      var params=new URLSearchParams(location.search);
      if(params.get("c")) state.share={ type:"collection", id:params.get("c"), loading:true };
      else if(params.get("i")) state.share={ type:"item", id:params.get("i"), loading:true };
      else if(params.get("u")) state.share={ type:"profile", username:params.get("u"), loading:true, tab:"acervo", commentType:"movie" };
    }catch(e){}
  }
  render();
  if(!configured) return;
  if(state.share){ loadShare(); }
  supabase.auth.onAuthStateChange(function(event, session){
    state.authResolved=true;
    if(session && session.user){ state.user=session.user; onSignedIn(); }
    else { state.user=null; state.profile=null; state.items=[]; state.playlists=[]; state.links=[]; render(); }
  });
  setTimeout(function(){ if(!state.authResolved){ state.authResolved=true; render(); } }, 5000);
}
init();
